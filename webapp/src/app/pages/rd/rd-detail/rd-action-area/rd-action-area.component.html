<div class="rd-action-area">
  @for (action of actionButtons(); track action.key) {
    @if (action.confirm) {
      <button
        nz-button
        [nzType]="action.primary ? 'primary' : 'default'"
        [disabled]="busy()"
        nz-popconfirm
        [nzPopconfirmTitle]="action.confirm.title"
        [nzPopconfirmPlacement]="action.confirm.placement"
        (nzOnConfirm)="actionClick.emit(action.key)"
      >
        {{ action.label }}
      </button>
    } @else {
      <button
        nz-button
        [nzType]="action.primary ? 'primary' : 'default'"
        [disabled]="busy()"
        (click)="actionClick.emit(action.key)"
      >
        {{ action.label }}
      </button>
    }
  }
  @if (canDeleteSelectedItem()) {
      <button
        nz-button
        nzType="default"
        nzDanger
        [disabled]="busy()"
        nz-popconfirm
        nzPopconfirmTitle="确认删除该研发项吗？删除后无法恢复。"
        nzPopconfirmPlacement="topRight"
        (nzOnConfirm)="deleteClick.emit()"
        class="delete-btn"
      >
        删除研发项
      </button>
  }
  @if (canEditSelectedProgress()) {
    <div class="progress-wrap">
      <div class="progress-head">
        <span>进度调节</span>     
        <span>{{ progressDraft() }}%</span>
      </div>
      <nz-slider
        [nzMin]="0"
        [nzMax]="100"
        [nzStep]="5"
        [nzDisabled]="busy()"
        [ngModel]="progressDraft()"
        (ngModelChange)="updateProgressDraft($event)"
      ></nz-slider>
      <div class="progress-actions">
        <button
          nz-button
          nzType="default"
          [disabled]="busy() || !progressDirty()"
          (click)="resetProgress()"
        >
          重置
        </button>
        <button
          nz-button
          nzType="primary"
          [disabled]="busy() || !progressDirty()"
          nz-popconfirm
          nzPopconfirmTitle="确认保存该研发项进度吗？"
          nzPopconfirmPlacement="topRight"
          (nzOnConfirm)="saveProgress()"
        >
          保存进度
        </button>
      </div>
    </div>
  }
  @if (actionButtons().length === 0) {
    <span class="action-card__empty">当前状态无可执行操作</span>
  }
</div>
