<div class="page">
  <nz-card class="shell" nzTitle="导入项目">
    <div class="row">
      <input nz-input [(ngModel)]="path" placeholder="粘贴或选择一个项目文件夹路径" />
      <button nz-button (click)="pick()">选择</button>
    </div>
    <div class="actions">
      <button nz-button nzType="primary" (click)="goCreate()" [disabled]="!path.trim()">
        导入这个文件夹
      </button>
    </div>
  </nz-card>
</div>
