<div class="conf-page">
  <div nz-row nzAlign="middle" nzJustify="space-between" class="page-header">
    <div nz-col>
      <div class="title">
        项目配置
        @if (loading()) {
          <nz-icon nzType="loading" nzTheme="outline" />
        }
      </div>
    </div>
    <div nz-col>
      <div class="actions">
        <button nz-button nzType="primary" (click)="openConfig()">打开配置文件</button>
        <app-ng-devtool></app-ng-devtool>
      </div>
    </div>
  </div>
  <div nz-row nzJustify="center" class="page-content">
    <div class="panel" nz-col nzXs="24" nzSm="24" nzMd="20" nzLg="16" nzXl="16">
      <app-config-nav-component
        [nodes]="nodes()"
        [active]="activeNodeId() ?? ''"
        (nodeSelect)="onNodeSelect($event)"
      ></app-config-nav-component>
      <div class="content">
        <app-config-section-component
          [fileNodes]="contentFileNodes()"
          [schemas]="schemas()"
          [valuesByType]="valuesByType()"
          [vmOptionsByType]="vmOptionsByType()"
          (valuesChange)="onValuesChange($event)"
        ></app-config-section-component>
      </div>
    </div>
  </div>
</div>
