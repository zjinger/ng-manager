<nz-space>
  <button
    nz-button
    nzType="primary"
    [disabled]="isRunning"
    (click)="run.emit()"
    [disabled]="disabled || isRunning"
  >
    <span nz-icon nzType="play-circle"></span> 运行
  </button>

  <button nz-button nzDanger [disabled]="disabled || !isRunning" (click)="stop.emit()">
    <span nz-icon nzType="stop"></span> 停止
  </button>
</nz-space>
