<div class="analysis-panel">
  <div class="panel-header">
    <div>
      <div class="title">
        <nz-icon [nzType]="showRuntimeAnalysis ? 'line-chart' : 'bar-chart'" />
        {{ showRuntimeAnalysis ? '运行分析' : '构建分析' }}
      </div>
      @if (report?.summary?.outputPath) {
        <div class="sub">{{ report?.summary?.outputPath }}</div>
      }
    </div>
    <div class="header-actions">
      @if (analyzing) {
        <nz-tag nzColor="processing">
          <nz-icon nzType="sync" nzSpin />
          分析中...
        </nz-tag>
      }
      <button type="button" class="refresh-btn" (click)="refresh()">
        <nz-icon nzType="reload" />
        刷新
      </button>
    </div>
  </div>

  @if (report) {
    <app-task-analysis-report
      [report]="report"
      [topAssets]="topAssets"
      [assets]="assets"
      [insightGroups]="insightGroups"
      [historyRows]="historyRows"
      [historyDeltaItems]="historyDeltaItems"
      [historyError]="historyError"
      [treemapCells]="treemapCells"
      [statsChunks]="statsChunks"
      [statsDependencies]="statsDependencies"
      [statsModules]="statsModules"
      [useVirtualAssetTable]="useVirtualAssetTable"
      [assetViewportHeight]="assetViewportHeight"
      [diagnosticInsights]="analyzerDiagnostics"
      [formatSizeFn]="formatSizeFn"
      [formatOptionalSizeFn]="formatOptionalSizeFn"
      [formatRatioFn]="formatRatioFn"
      [formatTimeFn]="formatTimeFn"
      [formatMsFn]="formatMsFn"
      [sizeLevelFn]="sizeLevelFn"
      [getTypeColorFn]="getTypeColorFn"
      [getTypeIconFn]="getTypeIconFn"
      [trackByModPathFn]="trackByModPathFn"
    ></app-task-analysis-report>
  } @else if (showRuntimeAnalysis) {
    <app-task-analysis-runtime
      [runtimeSnapshot]="runtimeSnapshot"
      [runtimeUrls]="runtimeUrls"
      [copiedUrl]="copiedUrl"
      [formatTimeFn]="formatTimeFn"
      [formatMsFn]="formatMsFn"
      (copyUrl)="copyUrl($event)"
    ></app-task-analysis-runtime>
  } @else {
    @if (analyzerDiagnostics.length > 0) {
      <app-task-analysis-diagnostics
        [items]="analyzerDiagnostics"
        [open]="true"
      ></app-task-analysis-diagnostics>
    }
    <div class="empty">
      <nz-empty [nzNotFoundContent]="emptyText"></nz-empty>
    </div>
  }
</div>
