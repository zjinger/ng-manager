@if (taskId) {
<div class="console-card">
  <div class="header">
    <div class="title">
      <div class="id">{{ taskId }}</div>

      <div class="badge" [attr.data-status]="status.status">
        {{ status.status }}

        @if (status.status === 'running' && status.pid) { (pid={{ status.pid }}) } @if
        (status.status === 'stopped' && status.exitCode !== undefined) { (exit={{
          status.exitCode
        }}) }
      </div>
    </div>

    <div class="actions">
      <button class="btn" (click)="toggleFollow()">
        {{ follow ? 'Follow: ON' : 'Follow: OFF' }}
      </button>

      <button class="btn" (click)="clear()">Clear</button>
    </div>
  </div>

  <div #viewport class="viewport">
    @for (l of lines; track $index) {
    <div class="line" [attr.data-stream]="l.stream">
      <span class="text">{{ l.text }}</span>
    </div>
    }
  </div>
</div>
}
