@if (isLoginPage()) {
  <router-outlet></router-outlet>
} @else {
  <nz-layout class="app-shell">
    <nz-header class="app-header">
      <div class="brand">
        <div class="logo">
          <img src="/favicon.ico" alt="logo" class="logo" />
        </div>
        <span class="title">{{ title() }}</span>
      </div>

      <div class="header-actions">
        <span class="notify-btn" [class.offline]="!ws.connected()">
          <nz-badge [nzCount]="unreadCount()">
            <span nz-icon nzType="bell"></span>
          </nz-badge>
        </span>

        <a nz-dropdown [nzDropdownMenu]="userMenu" nzTrigger="click" class="user-trigger">
          <span class="avatar">{{ avatarText() }}</span>
          <span class="user-name">{{ displayName() }}</span>
          <span nz-icon nzType="down" class="down-icon"></span>
        </a>

        <nz-dropdown-menu #userMenu="nzDropdownMenu">
          <ul nz-menu>
            <li nz-menu-item [nzDisabled]="loggingOut()" (click)="logout()">退出登录</li>
          </ul>
        </nz-dropdown-menu>
      </div>
    </nz-header>

    <nz-layout class="shell-body">
      <nz-sider [nzWidth]="256" class="app-sider">
        <ul nz-menu nzMode="inline" class="main-menu">
          <li
            nz-menu-item
            routerLink="/dashboard"
            routerLinkActive="ant-menu-item-selected"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <span nz-icon nzType="dashboard"></span>
            <span>仪表盘</span>
          </li>

          <li nz-menu-item routerLink="/announcements" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="notification"></span>
            <span>公告管理</span>
          </li>

          <li nz-menu-item routerLink="/projects" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="appstore"></span>
            <span>项目管理</span>
          </li>

          <li nz-menu-item routerLink="/users" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="team"></span>
            <span>用户管理</span>
          </li>

          <li nz-menu-item routerLink="/docs" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="file-text"></span>
            <span>文档管理</span>
          </li>

          <li nz-menu-item routerLink="/feedback" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="message"></span>
            <span>反馈管理</span>
          </li>

          <li nz-menu-item routerLink="/issues" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="bug"></span>
            <span>测试管理</span>
          </li>

          <li nz-menu-item routerLink="/releases" routerLinkActive="ant-menu-item-selected">
            <span nz-icon nzType="branches"></span>
            <span>版本管理</span>
          </li>
        </ul>
      </nz-sider>

      <nz-content class="app-content">
        <router-outlet></router-outlet>
      </nz-content>
    </nz-layout>
  </nz-layout>

  <nz-modal
    [nzVisible]="mustChangePasswordVisible()"
    nzTitle="首次登录请修改密码"
    [nzMaskClosable]="false"
    [nzKeyboard]="false"
    [nzClosable]="false"
    [nzFooter]="null"
  >
    <ng-container *nzModalContent>
      @if (changePasswordError()) {
        <nz-alert nzType="error" [nzMessage]="changePasswordError()!" nzShowIcon></nz-alert>
      }

      <form nz-form nzLayout="vertical" [formGroup]="passwordForm" class="change-password-form">
        <nz-form-item>
          <nz-form-label nzRequired>当前密码</nz-form-label>
          <nz-form-control>
            <input nz-input type="password" formControlName="oldPassword" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>新密码</nz-form-label>
          <nz-form-control>
            <input nz-input type="password" formControlName="newPassword" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>确认新密码</nz-form-label>
          <nz-form-control>
            <input nz-input type="password" formControlName="confirmPassword" />
          </nz-form-control>
        </nz-form-item>

        <button nz-button nzType="primary" (click)="submitPasswordChange()" [disabled]="changingPassword()">
          确认修改
        </button>
      </form>
    </ng-container>
  </nz-modal>
}
