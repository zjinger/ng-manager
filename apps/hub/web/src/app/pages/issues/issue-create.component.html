<section class="page page-shell">
  <app-page-header title="新建工单" subtitle="选择项目后录入问题信息，可直接附加截图、日志等附件">
    <a page-header-actions nz-button routerLink="/issues">返回列表</a>
  </app-page-header>

  @if (error()) {
    <nz-alert class="section" nzType="error" [nzMessage]="error()!" nzShowIcon></nz-alert>
  }

  <div class="create-page-layout">
    <div class="create-main">
      <nz-card class="section section-card compact-card" nzTitle="基础信息">
        <form nz-form [formGroup]="form" class="project-form compact-form" nzLayout="vertical">
          <nz-form-item>
            <nz-form-label nzRequired>所属项目</nz-form-label>
            <nz-form-control nzErrorTip="请选择项目">
              <nz-select
                formControlName="projectId"
                nzPlaceHolder="请选择项目"
                [nzLoading]="loading()"
                [nzShowSearch]="true"
                nzOptionFilterProp="nzLabel"
              >
                @for (project of projects(); track project.id) {
                  <nz-option [nzValue]="project.id" [nzLabel]="projectLabel(project)"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </form>
      </nz-card>

      <nz-card class="section section-card" nzTitle="工单内容">
        <app-issue-form
          mode="create"
          [memberOptions]="projectMembers()"
          [moduleOptions]="moduleOptions()"
          [versionOptions]="versionOptions()"
          [environmentOptions]="environmentOptions()"
          [submitting]="submitting()"
          (submitted)="submitIssue($event)"
          (cancelled)="cancel()"
        />
      </nz-card>
    </div>

    <div class="create-side">
      <nz-card class="section section-card attachment-card" nzTitle="附件">
        <section class="attachment-panel">
          <div class="section-head">
            <div class="section-head__meta">
              <h4>上传附件</h4>
              <span class="muted">支持文件上传，也支持 Ctrl+V 粘贴截图</span>
            </div>

            <label nz-button nzType="text" class="upload-trigger">
              <i nz-icon nzType="upload"></i>
              选择文件
              <input #filePicker hidden type="file" multiple (change)="selectFiles(filePicker)" />
            </label>
          </div>

          <div class="paste-tip">
            可在当前页面直接按 <strong>Ctrl + V</strong> 粘贴截图，也可上传日志、文档等辅助材料。
          </div>

          @if (pendingAttachmentItems().length === 0) {
            <div class="attachment-empty">
              <div class="attachment-empty__icon">
                <i nz-icon nzType="inbox"></i>
              </div>
              <div class="attachment-empty__title">暂无附件</div>
              <div class="attachment-empty__desc">上传截图、日志或说明文档后，会显示在这里</div>
            </div>
          } @else {
            <app-attachment-card-list
              class="pending-cards"
              [items]="pendingAttachmentItems()"
              [showRemove]="true"
              [loading]="submitting()"
              (remove)="removePendingFile($event)"
            ></app-attachment-card-list>
          }
        </section>
      </nz-card>
    </div>
  </div>
</section>
