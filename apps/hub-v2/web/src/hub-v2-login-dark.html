<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub v2 — 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand */
      --primary-50: #EEF2FF; --primary-100: #E0E7FF; --primary-200: #C7D2FE;
      --primary-300: #A5B4FC; --primary-400: #818CF8; --primary-500: #6366F1;
      --primary-600: #4F46E5; --primary-700: #4338CA; --primary-800: #3730A3; --primary-900: #312E81;

      /* Dark palette */
      --dk-bg: #0B0E14;
      --dk-surface: #12161F;
      --dk-surface-2: #191E2A;
      --dk-surface-3: #1F2536;
      --dk-border: #2A3042;
      --dk-border-focus: #3B4766;
      --dk-text: #E2E8F0;
      --dk-text-2: #94A3B8;
      --dk-text-3: #64748B;
      --dk-hover: #1E2538;

      --danger: #F87171; --danger-dim: rgba(248,113,113,0.12);
      --success: #34D399;
      --warning: #FBBF24;

      --border-radius: 10px; --border-radius-sm: 8px;
      --shadow-glow: 0 0 40px rgba(99,102,241,0.08);
      --transition: all 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--dk-bg); color: var(--dk-text); font-size: 14px; line-height: 1.5;
      min-height: 100vh; display: flex;
    }

    /* ===== Ambient background ===== */
    .bg-ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-ambient .glow {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
    }
    .bg-ambient .glow-1 {
      width: 600px; height: 600px; background: var(--primary-600);
      top: -200px; left: -100px;
    }
    .bg-ambient .glow-2 {
      width: 400px; height: 400px; background: #7C3AED;
      bottom: -100px; right: -50px;
    }
    .bg-ambient .glow-3 {
      width: 300px; height: 300px; background: #0EA5E9;
      top: 60%; left: 30%; opacity: 0.08;
    }

    /* Subtle grain overlay */
    .bg-ambient::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ===== Left Panel ===== */
    .login-left {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px;
      position: relative; z-index: 1;
    }

    /* Grid dots */
    .login-left::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .brand-block { position: relative; z-index: 1; text-align: center; }

    .brand-icon-large {
      width: 80px; height: 80px;
      background: linear-gradient(145deg, var(--primary-500), var(--primary-700));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 34px;
      margin: 0 auto 28px;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.2),
        0 8px 40px rgba(99,102,241,0.3),
        0 0 80px rgba(99,102,241,0.1);
      position: relative;
    }
    .brand-icon-large::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(99,102,241,0.4), transparent 60%);
      z-index: -1; filter: blur(8px);
    }

    .brand-title {
      font-size: 40px; font-weight: 800; color: #fff;
      letter-spacing: -0.8px; margin-bottom: 10px;
      display: flex; align-items: baseline; justify-content: center; gap: 12px;
    }
    .brand-title .version {
      font-size: 13px; padding: 3px 10px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px; color: var(--primary-300);
      font-weight: 600; font-family: 'SF Mono', monospace;
    }

    .brand-subtitle {
      font-size: 15px; color: var(--dk-text-3);
      letter-spacing: 4px; font-weight: 400;
    }

    .brand-features {
      margin-top: 56px; display: flex; gap: 44px;
      position: relative; z-index: 1;
    }
    .brand-feature {
      text-align: center; color: var(--dk-text-3);
      transition: var(--transition);
    }
    .brand-feature:hover { color: var(--dk-text-2); }
    .brand-feature i {
      font-size: 20px; color: var(--primary-400);
      margin-bottom: 10px; display: block;
      opacity: 0.7;
    }
    .brand-feature:hover i { opacity: 1; }
    .brand-feature span { font-size: 13px; font-weight: 500; }

    /* Decorative floating shapes */
    .float-shape {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(99,102,241,0.08);
    }
    .float-shape-1 { width: 200px; height: 200px; top: 15%; left: 10%; }
    .float-shape-2 { width: 120px; height: 120px; bottom: 20%; right: 15%; }
    .float-shape-3 {
      width: 80px; height: 80px; top: 40%; right: 8%;
      border-color: rgba(124,58,237,0.08);
    }

    /* ===== Right Panel ===== */
    .login-right {
      width: 480px;
      display: flex; align-items: center; justify-content: center;
      padding: 48px;
      background: var(--dk-surface);
      border-left: 1px solid var(--dk-border);
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .login-form-wrap { width: 100%; max-width: 360px; }

    .login-greeting { margin-bottom: 32px; }
    .login-greeting h2 {
      font-size: 24px; font-weight: 700; color: #fff;
      letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .login-greeting p {
      font-size: 14px; color: var(--dk-text-3);
    }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--dk-text-2);
      margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .form-input-wrap { position: relative; }
    .form-input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--dk-text-3); font-size: 14px; pointer-events: none;
      transition: var(--transition);
    }
    .form-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1px solid var(--dk-border);
      border-radius: var(--border-radius-sm);
      font-size: 14px; color: var(--dk-text);
      transition: var(--transition);
      font-family: inherit; height: 44px;
      background: var(--dk-surface-2);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary-500);
      background: var(--dk-surface-3);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15), var(--shadow-glow);
    }
    .form-input:focus ~ .input-icon { color: var(--primary-400); }
    .form-input::placeholder { color: var(--dk-text-3); }

    .form-input-wrap .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--dk-text-3);
      cursor: pointer; font-size: 14px; padding: 4px;
      transition: var(--transition);
    }
    .form-input-wrap .toggle-pw:hover { color: var(--dk-text-2); }

    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; color: var(--dk-text-2);
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--primary-500);
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px; color: var(--primary-400);
      text-decoration: none; font-weight: 500;
      transition: var(--transition);
    }
    .forgot-link:hover { color: var(--primary-300); }

    .btn-login {
      width: 100%; height: 46px;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      color: #fff; border: none;
      border-radius: var(--border-radius-sm);
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.5px;
      position: relative; overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: var(--transition);
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:hover {
      box-shadow: 0 4px 20px rgba(99,102,241,0.4), 0 0 40px rgba(99,102,241,0.15);
      transform: translateY(-1px);
    }
    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0;
      color: var(--dk-text-3); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--dk-border);
    }

    .sso-btns { display: flex; gap: 10px; }
    .sso-btn {
      flex: 1; height: 42px;
      background: var(--dk-surface-2);
      border: 1px solid var(--dk-border);
      border-radius: var(--border-radius-sm);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 13px; color: var(--dk-text-2); font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }
    .sso-btn:hover {
      border-color: var(--dk-border-focus);
      background: var(--dk-surface-3);
      color: var(--dk-text);
    }
    .sso-btn i { font-size: 16px; }

    .login-footer {
      margin-top: 36px; text-align: center;
      font-size: 12px; color: var(--dk-text-3);
    }
    .login-footer a {
      color: var(--dk-text-3); text-decoration: none;
      transition: var(--transition);
    }
    .login-footer a:hover { color: var(--primary-400); }

    /* ===== Error states ===== */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.35s ease; }
    .form-error {
      font-size: 12px; color: var(--danger);
      margin-top: 6px; display: none;
      align-items: center; gap: 4px;
    }
    .form-error.show { display: flex; }
    .form-error i { font-size: 11px; }
    .form-input.error {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 3px var(--danger-dim) !important;
    }

    /* ===== Loading ===== */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .login-left { min-height: 260px; padding: 36px; }
      .brand-features { display: none; }
      .float-shape { display: none; }
      .login-right {
        width: 100%; padding: 36px;
        border-left: none; border-top: 1px solid var(--dk-border);
      }
    }

    /* ===== Theme toggle ===== */
    .theme-toggle {
      position: absolute; top: 20px; right: 20px;
      width: 36px; height: 36px;
      background: var(--dk-surface-2);
      border: 1px solid var(--dk-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--dk-text-3); font-size: 14px;
      cursor: pointer; transition: var(--transition);
      z-index: 10;
    }
    .theme-toggle:hover {
      border-color: var(--primary-500);
      color: var(--primary-400);
      background: var(--dk-surface-3);
    }
  </style>
</head>
<body>

  <!-- Ambient background glow -->
  <div class="bg-ambient">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="window.location.href='hub-v2-login.html'" title="切换亮色主题">
    <i class="fas fa-sun"></i>
  </button>

  <!-- Left: Branding -->
  <div class="login-left">
    <div class="float-shape float-shape-1"></div>
    <div class="float-shape float-shape-2"></div>
    <div class="float-shape float-shape-3"></div>

    <div class="brand-block">
      <div class="brand-icon-large"><i class="fas fa-cube"></i></div>
      <div class="brand-title">
        Hub
        <span class="version">v2</span>
      </div>
      <div class="brand-subtitle">内 网 协 作 平 台</div>
    </div>

    <div class="brand-features">
      <div class="brand-feature">
        <i class="fas fa-bug"></i>
        <span>Issue 追踪</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-code-branch"></i>
        <span>研发管理</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-file-alt"></i>
        <span>文档协作</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-chart-bar"></i>
        <span>数据看板</span>
      </div>
    </div>
  </div>

  <!-- Right: Login Form -->
  <div class="login-right">
    <div class="login-form-wrap">
      <div class="login-greeting">
        <h2>欢迎回来 👋</h2>
        <p>登录你的账号以继续使用 Hub</p>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名 / 邮箱</label>
          <div class="form-input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" autocomplete="username" />
          </div>
          <div class="form-error" id="userError"><i class="fas fa-exclamation-circle"></i> 请输入用户名或邮箱</div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="form-input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword()">
              <i class="fas fa-eye" id="pwEyeIcon"></i>
            </button>
          </div>
          <div class="form-error" id="pwError"><i class="fas fa-exclamation-circle"></i> 请输入密码</div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" checked />
            <span>记住登录状态</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">登 录</span>
          <div class="spinner" id="loginSpinner"></div>
          <i class="fas fa-arrow-right btn-icon"></i>
        </button>
      </form>

      <div class="divider">或使用以下方式登录</div>

      <div class="sso-btns">
        <button class="sso-btn" type="button">
          <i class="fab fa-microsoft" style="color:#00A4EF;"></i>
          <span>企业 SSO</span>
        </button>
        <button class="sso-btn" type="button">
          <i class="fas fa-qrcode" style="color:var(--dk-text-2);"></i>
          <span>扫码登录</span>
        </button>
      </div>

      <div class="login-footer">
        © 2026 Hub v2 · 内网协作平台 · v2.3.1
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('pwEyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username');
      const pw = document.getElementById('password');
      const userErr = document.getElementById('userError');
      const pwErr = document.getElementById('pwError');
      let valid = true;

      // Reset
      userErr.classList.remove('show');
      pwErr.classList.remove('show');
      user.classList.remove('error');
      pw.classList.remove('error');
      user.parentElement.classList.remove('shake');
      pw.parentElement.classList.remove('shake');

      if (!user.value.trim()) {
        userErr.classList.add('show');
        user.classList.add('error');
        user.parentElement.classList.add('shake');
        valid = false;
      }
      if (!pw.value) {
        pwErr.classList.add('show');
        pw.classList.add('error');
        pw.parentElement.classList.add('shake');
        valid = false;
      }

      if (!valid) return false;

      // Loading state
      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnIcon = btn.querySelector('.btn-icon');
      const spinner = document.getElementById('loginSpinner');

      btnText.textContent = '登录中…';
      btnIcon.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;
      btn.style.opacity = '0.8';

      setTimeout(() => {
        btnText.textContent = '✓ 登录成功';
        spinner.style.display = 'none';
        btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
        btn.style.opacity = '1';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      }, 1500);

      return false;
    }
  </script>
</body>
</html>
