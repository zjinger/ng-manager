    <form nz-form [nzLayout]="'vertical'">
      <div class="row" nz-row [nzGutter]="16">
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired nzFor="username">登录名</nz-form-label>
            <nz-form-control nzErrorTip="请输入登录名">
              <input
                nz-input
                required="true"
                [ngModel]="draft().username"
                name="username"
                (ngModelChange)="updateField('username', $event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired nzFor="displayName">用户姓名</nz-form-label>
            <nz-form-control nzErrorTip="请输入用户姓名">
              <input
                nz-input
                required="true"
                [ngModel]="draft().displayName"
                name="displayName"
                (ngModelChange)="updateField('displayName', $event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div class="row" nz-row [nzGutter]="16">
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="email">邮箱</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="draft().email"
                name="email"
                (ngModelChange)="updateField('email', $event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="mobile">手机号</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="draft().mobile"
                name="mobile"
                (ngModelChange)="updateField('mobile', $event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div class="row" nz-row [nzGutter]="16">
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="titleCode">职务</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="draft().titleCode"
                name="titleCode"
                (ngModelChange)="updateField('titleCode', $event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="col" nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="status">状态</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="draft().status"
                name="status"
                (ngModelChange)="updateField('status', $event)"
              >
                <nz-option nzLabel="活跃" nzValue="active"></nz-option>
                <nz-option nzLabel="停用" nzValue="inactive"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div class="row" nz-row [nzGutter]="16">
        <div class="col" nz-col [nzSpan]="24">
          <nz-form-item>
            <nz-form-label nzFor="remark">备注</nz-form-label>
            <nz-form-control>
              <textarea
                nz-input
                rows="4"
                [ngModel]="draft().remark"
                name="remark"
                (ngModelChange)="updateField('remark', $event)"
              ></textarea>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </div>

  <ng-container dialog-footer>
    <button nz-button type="button" (click)="cancel.emit()">取消</button>
    <button
      nz-button
      nzType="primary"
      [nzLoading]="busy()"
      [disabled]="!draft().username.trim() || !draft().displayName.trim()"
      (click)="submitForm()"
      type="submit"
      form="user-form"
    >
      <nz-icon nzType="check" nzTheme="outline"></nz-icon>
      {{ mode() === 'create' ? '创建用户' : '保存修改' }}
    </button>
  </ng-container>
</app-dialog-shell>
