<app-dialog-shell
  [open]="open()"
  [width]="640"
  [title]="mode() === 'create' ? '新建部门' : '编辑部门'"
  [subtitle]="''"
  [icon]="mode() === 'create' ? 'plus-square' : 'edit'"
  (cancel)="cancel.emit()"
>
  <div dialog-body>
    <form nz-form [nzLayout]="'vertical'" class="department-dialog-form">
      <nz-form-item>
        <nz-form-label nzRequired nzFor="departmentName">部门名称</nz-form-label>
        <nz-form-control nzErrorTip="请输入部门名称">
          <input
            nz-input
            required="true"
            name="departmentName"
            placeholder="输入部门名称"
            [ngModel]="draft().name"
            (ngModelChange)="updateField('name', $event)"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired nzFor="departmentParent">上级部门</nz-form-label>
        <nz-form-control>
          <nz-select
            nzAllowClear
            nzPlaceHolder="无上级部门"
            name="departmentParent"
            [ngModel]="draft().parentId"
            (ngModelChange)="updateField('parentId', $event || '')"
          >
            <nz-option nzLabel="无上级部门" nzValue=""></nz-option>
            @for (department of availableParentDepartments(); track department.id) {
              <nz-option [nzLabel]="department.name" [nzValue]="department.id"></nz-option>
            }
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <div class="department-dialog-row">
        <nz-form-item>
          <nz-form-label nzFor="departmentOwner">部门负责人</nz-form-label>
          <nz-form-control>
            <input nz-input name="departmentOwner" placeholder="暂未接入负责人字段" disabled />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzFor="departmentCode">部门编号</nz-form-label>
          <nz-form-control>
            <input
              nz-input
              name="departmentCode"
              placeholder="自动生成"
              disabled
              [ngModel]="draft().code"
              (ngModelChange)="updateField('code', $event)"
            />
          </nz-form-control>
        </nz-form-item>
      </div>

      <nz-form-item>
        <nz-form-label nzFor="departmentDescription">部门描述</nz-form-label>
        <nz-form-control>
          <textarea nz-input name="departmentDescription" placeholder="暂未接入部门描述字段" disabled></textarea>
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>

  <ng-container dialog-footer>
    <button nz-button type="button" (click)="cancel.emit()">取消</button>
    <button nz-button nzType="primary" [nzLoading]="busy()" [disabled]="!canSubmit()" (click)="submitForm()" type="button">
      <nz-icon nzType="check" nzTheme="outline"></nz-icon>
      {{ mode() === 'create' ? '创建部门' : '保存修改' }}
    </button>
  </ng-container>
</app-dialog-shell>
