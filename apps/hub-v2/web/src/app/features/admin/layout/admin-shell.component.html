<div class="shell" [class.shell--collapsed]="uiStore.sidebarCollapsed()">
  <app-sidebar
    [items]="navSections"
    [collapsed]="uiStore.sidebarCollapsed()"
    [showProjectSwitcher]="false"
    brandName="Hub v2 Admin"
    brandBadge="ADMIN"
    brandRoute="/admin"
    brandLogo="/logo.svg"
    brandLogoAlt="Hub v2 Admin"
  />

  <div class="shell__main">
    <app-topbar
      rootLabel="系统管理"
      rootRoute="/admin"
      searchPlaceholder="搜索用户、部门、角色…"
      [searchEnabled]="false"
      [showWsIndicator]="false"
      [showNotificationBell]="false"
      [showReturnToWorkbench]="true"
    />

    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</div>
