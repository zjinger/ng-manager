<section class="hero" aria-labelledby="heroTitle">
  <div class="hero-icon">H2</div>
  <h1 id="heroTitle">{{ displayTitle() }}</h1>
  <p>{{ displayDescription() }}</p>
  <div class="hero-badges" aria-label="发布信息">
    <span class="hero-badge">{{ versionText() }}</span>
    <span class="hero-badge">{{ compatibility() }}</span>
    <span class="hero-badge">{{ channelText() }}</span>
  </div>
</section>
