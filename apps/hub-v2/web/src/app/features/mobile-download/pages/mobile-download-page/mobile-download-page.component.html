<main class="release-page">
  <header class="topbar">
    <div class="page nav">
      <a class="brand" href="#top" aria-label="Hub V2 发布中心">
        <span class="logo">H2</span>
        <span>
          <span class="brand-title">Hub V2 发布中心</span>
          <span class="brand-subtitle">App / Web / 更新公告统一入口</span>
        </span>
      </a>
      <nav class="nav-actions" aria-label="页面导航">
        <a class="btn desktop-only" href="#changes">更新内容</a>
        <a class="btn desktop-only" href="#help">安装帮助</a>
        <button class="icon-btn" type="button" aria-label="切换深浅色主题" (click)="toggleTheme()">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 3v2.5M12 18.5V21M21 12h-2.5M5.5 12H3M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8M18.4 18.4l-1.8-1.8M7.4 7.4 5.6 5.6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
          </svg>
        </button>
        <a class="btn primary" href="#download">立即下载</a>
      </nav>
    </div>
  </header>

  @if (loading()) {
    <section class="state page">
      <div class="state-card">
        <span class="loader"></span>
        <h1>正在加载下载信息</h1>
        <p>请稍候，正在连接 Hub V2 发布服务。</p>
      </div>
    </section>
  } @else if (error()) {
    <section class="state page">
      <div class="state-card">
        <h1>下载信息不可用</h1>
        <p>{{ error() }}</p>
        <button class="btn primary" type="button" (click)="load()">重试</button>
      </div>
    </section>
  } @else if (info(); as data) {
    <div id="top" class="page">
      <section class="hero" aria-labelledby="heroTitle">
        <app-mobile-download-hero [info]="data" [selectedPlatform]="selectedPlatform()" />
        <app-mobile-download-panel
          [info]="data"
          [selectedPlatform]="selectedPlatform()"
          [selectedPlatformKey]="selectedPlatformKey()"
          (platformSelected)="selectPlatform($event)"
        />
      </section>

      <app-mobile-download-sections
        [info]="data"
        [selectedPlatform]="selectedPlatform()"
        (copyChecksum)="copyChecksum($event)"
      />
    </div>

    <div class="mobile-sticky">
      @if (selectedPlatform()?.downloadUrl) {
        <a class="btn primary block" [href]="selectedPlatform()?.downloadUrl" target="_blank" rel="noopener noreferrer">
          {{ stickyDownloadText() }}
        </a>
      } @else {
        <button class="btn primary block" type="button" disabled>暂无安装包</button>
      }
    </div>
  }

  @if (toast()) {
    <div class="toast" role="status" aria-live="polite">{{ toast() }}</div>
  }
</main>
