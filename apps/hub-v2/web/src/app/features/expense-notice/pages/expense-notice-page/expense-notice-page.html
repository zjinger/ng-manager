<app-page-header title="公告管理" [subtitle]="''" />

<!-- 筛选栏 -->
<app-notice-filter-bar
  [query]="currentQuery()"
  [noticeTypeOptions]="noticeTypeOptions"
  [noticeStatusOptions]="statusOptions"
  [visibleScopeOptions]="visibleScopeOptions"
  (submit)="handleFilter($event)"
/>

<!-- 页面操作 -->
<div class="page-actions">
  <button nz-button nzType="primary" (click)="openCreateDialog()">
    <nz-icon nzType="plus" nzTheme="outline" />
    新建公告
  </button>
</div>

<!-- 新建 / 编辑公告弹窗 -->
<app-notice-create-dialog
  [open]="dialogOpen()"
  [busy]="dialogBusy()"
  [value]="editingNotice()"
  [noticeTypeOptions]="noticeTypeOptions"
  [visibleScopeOptions]="visibleScopeOptions"
  [publishStatusOptions]="statusOptions"
  (cancel)="closeDialog()"
  (submit)="handleSubmit($event)"
/>

<!-- 公告列表 -->
<app-list-state
  [loading]="loading()"
  [empty]="displayData.length === 0"
  loadingText="正在加载公告列表..."
  emptyTitle="暂无公告数据"
  emptyDescription="当前没有符合条件的公告"
>
  <app-notice-list
    [items]="displayData"
    [selectedId]="selectedId()"
    (select)="handleSelect($event)"
  />
</app-list-state>

<!-- 公告详情抽屉 -->
<app-notice-detail-drawer
  [open]="detailOpen()"
  [detail]="currentDetail()"
  [noticeTypeOptions]="noticeTypeOptions"
  [visibleScopeOptions]="visibleScopeOptions"
  [statusOptions]="statusOptions"
  (close)="closeDetailDrawer()"
  (edit)="handleEditFromDrawer($event)"
/>
