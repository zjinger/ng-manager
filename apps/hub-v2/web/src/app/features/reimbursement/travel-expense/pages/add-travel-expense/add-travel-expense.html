<app-page-header
  title="{{ expenseId ? '编辑' : '新建' }}差旅费报销"
  subtitle="结构化填写行程、费用与附件，实时预览单据。"
>
  <div page-header-actions class="header-actions">
    <button nz-button nzType="primary" (click)="openPreviewDialog()">
      <i nz-icon nzType="save"></i> 保存
    </button>
  </div>
</app-page-header>

<section class="travel-layout">
  <div class="travel-layout__main">
    <div class="card query-card">
      <div class="query-card__label">基础信息</div>
      <!-- 基础信息组件 -->
      <app-travel-expense-basicInfo
        [(value)]="draft().basicInfo"
        (valueChange)="onBasicInfoChange($event)"
        (validChange)="onBasicInfoValidChange($event)"
      />
    </div>

    <div class="card query-card">
      <!-- 行程与费用明细组件 -->
      <app-expense-details
        [(items)]="draft().expenseItems"
        (itemsChange)="onExpenseItemsChange($event)"
      />
    </div>

    <div class="card query-card">
      <div class="query-card__label">金额汇总与附件</div>
      <!-- 金额汇总与附件组件 -->
      <app-expense-summary-attachment
        [(summary)]="draft().summary"
        (summaryChange)="onSummaryChange($event)"
        (attachmentsChange)="onAttachmentsChange($event)"
        (advanceAmountChange)="onAdvanceAmountChange($event)"
      />
    </div>
  </div>
  <div class="report-layout__side">
    <div class="card query-card">
      <!-- 流程组件 -->
      <div class="query-card__label">审批流预览</div>
      <app-approval-flow
        [approvalPreview]="draft().approvalPreview!"
        (action)="handleApprovalAction($event)"
      />
    </div>
  </div>
</section>

<!-- 预览弹窗 -->
<save-dialog
  [open]="previewDialogOpen()"
  [formData]="previewData()"
  (confirm)="confirmSubmit($event)"
  (cancel)="closePreviewDialog()"
/>
