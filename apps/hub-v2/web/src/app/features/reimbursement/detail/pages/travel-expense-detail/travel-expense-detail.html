<section>
  <div class="btn-group">
    <button nz-button nzType="default" (click)="goBack()">
      <i nz-icon nzType="arrow-left"></i>返回
    </button>
    <ng-container>
      @if (headerData().status == 'draft') {
        <button 
          nz-button 
          nzType="primary" 
          (click)="goEdit()"
        >
          <i nz-icon nzType="edit"></i>编辑
        </button>
      }
    </ng-container>
  </div>
  <!-- 顶部信息 -->
  <app-process-header-card [data]="headerData()" />
  <section class="travel-layout">
    <!-- 主区域 -->
    <div class="travel-layout__main">
      <!-- 单据内容 -->
      <div class="card query-card">
        <div class="query-card__label">单据内容</div>
        @if (formData().claimType === 'general') {
          <app-expense-bill-preview [formData]="formData()" />
        } @else {
          <app-expense-preview [formData]="formData()" />
        }
      </div>
      <!-- 附件 -->
      <div class="card query-card">
        <div class="query-card__label">附件材料</div>
        @if (hasAttachments()) {
        <app-attachment-preview-wall
          [items]="attachmentItems()"
          [showMeta]="true"
          [removable]="false"
        />
        } @else {
        <div class="query-card__content">暂无附件</div>
        }
      </div>

      <!-- 操作记录 -->
      <div class="card query-card">
        <div class="query-card__label">操作记录</div>
        <app-record-list [records]="recordListData()" />
      </div>
    </div>

    <!-- 右侧审批流 -->
    <aside class="report-layout__side">
      <div class="card query-card">
        <div class="query-card__label">审批流程</div>
        <app-approval-flow [approvalPreview]="approvalPreview()" />
      </div>
      @if (currentTask(); as task) {
        <div class="card query-card">
          <div class="query-card__label">审批操作</div>
          <textarea
            nz-input
            class="approval-comment"
            [ngModel]="approvalComment()"
            (ngModelChange)="approvalComment.set($event)"
            placeholder="请输入审批意见，例如：票据完整，同意报销"
          ></textarea>
          <div class="approval-actions">
            <button nz-button nzType="primary" [nzLoading]="approving()" (click)="confirmApprove(task)">
              <i nz-icon nzType="check"></i>
              通过
            </button>
            <button nz-button nzDanger [nzLoading]="rejecting()" (click)="confirmReject(task)">
              <i nz-icon nzType="close"></i>
              驳回
            </button>
          </div>
        </div>
      }
    </aside>
  </section>
</section>
