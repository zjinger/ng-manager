<app-page-header
  title="{{ getPageTitle() }}"
  subtitle="适用于办公用品、行政费用、采购等普通费用报销。"
/>

<section class="travel-layout">
  <div class="travel-layout__main">
    <app-panel-card title="基础信息">
      <div class="form-panel-body">
        <app-expense-basic-info
          [(value)]="draft().basicInfo"
          (valueChange)="onBasicInfoChange($event)"
          (validChange)="onBasicInfoValidChange($event)"
        />
      </div>
    </app-panel-card>

    <app-panel-card title="费用明细">
      <div class="form-panel-body form-panel-body--table">
        <app-expense-detail-item
          [(items)]="draft().expenseItems"
          (itemsChange)="onExpenseItemsChange($event)"
        />
      </div>
    </app-panel-card>

    <app-panel-card title="金额与附件">
      <div class="form-panel-body">
        <app-expense-summary-attachment
          [(summary)]="draft().summary"
          [claimId]="expenseId"
          (summaryChange)="onSummaryChange($event)"
          (attachmentsChange)="onAttachmentsChange($event)"
          (advanceAmountChange)="onAdvanceAmountChange($event)"
        />
      </div>
    </app-panel-card>
  </div>

  <div class="report-layout__side">
    <app-panel-card title="审批流程">
      <div class="form-panel-body">
        <app-approval-flow
          [approvalPreview]="draft().approvalPreview!"
        />
      </div>
    </app-panel-card>

    <app-reimbursement-submit-action-card
      [(comment)]="submitComment"
      [submitting]="submitting()"
      (submit)="openPreviewDialog()"
    />

    @if (draft().logs.length > 0) {
      <app-reimbursement-logs-card [records]="draft().logs" />
    }
  </div>
</section>

<!-- 预览弹窗 -->
<ex-save-dialog
  [open]="previewDialogOpen()"
  [formData]="previewData()"
  (confirm)="confirmSubmit($event)"
  (cancel)="closePreviewDialog()"
/>
