<section>
  <!-- 按钮区域 -->
  <div class="btn-group">
    <button nz-button nzType="default" (click)="goBack()">
      <i nz-icon nzType="arrow-left"></i>
      返回
    </button>
    @if (headerData()?.status == 'draft' ) {
    <button nz-button nzType="primary" (click)="goEdit()">
      <i nz-icon nzType="edit"></i>
      编辑
    </button>
    }
  </div>

  <!-- 顶部信息 -->
  @if (headerData(); as header) {
  <app-process-header-card [data]="header" />
  }

  <section class="travel-layout">
    <!-- 主区域 -->
    <div class="travel-layout__main">
      <!-- 单据内容 -->
      <div class="card query-card">
        <div class="query-card__label">单据内容</div>
        @if (formData(); as formData) {
        <app-expense-bill-preview [formData]="formData" />
        }
      </div>

      <!-- 附件材料 -->
      <div class="card query-card">
        <div class="query-card__label">附件材料</div>
        @if (hasAttachments()) {
        <app-attachment-preview-wall
          [items]="attachmentItems()"
          [showMeta]="true"
          [removable]="false"
        />
        } @else {
        <div class="query-card__content">暂无附件</div>
        }
      </div>

      <!-- 操作记录 -->
      <div class="card query-card">
        <div class="query-card__label">操作记录</div>
        <app-record-list [records]="recordListData()" />
      </div>
    </div>

    <!-- 右侧审批流 -->
    <aside class="report-layout__side">
      <div class="card query-card">
        <div class="query-card__label">审批流预览</div>
        <app-approval-flow [approvalPreview]="approvalPreview()" />
      </div>
    </aside>
  </section>
</section>
