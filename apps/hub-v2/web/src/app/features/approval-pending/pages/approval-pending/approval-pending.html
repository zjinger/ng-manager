<app-page-header
  title="待我审批"
  subtitle="统一处理负责人、部门主管、审核、会计、出纳等节点任务。"
/>

<!-- 顶部统计 -->
<approval-dashboard-panel [stats]="dashboardStats()" />

<!-- 筛选栏 -->
<app-approval-filter-bar
  [query]="query()"
  [expenseTypeOptions]="expenseTypeOptions"
  [approvalNodeOptions]="approvalNodeOptions"
  [departmentOptions]="departmentOptions"
  (submit)="handleFilter($event)"
/>

<!-- 激活筛选 -->
<app-active-filters-bar
  [tags]="activeFilterTags()"
  (remove)="onRemoveFilter($event)"
  (clear)="resetFilters()"
/>

<!-- 报销单列表组件状态 -->
<app-list-state
  [loading]="loading()"
  [empty]="displayData().length === 0"
  loadingText="正在加载待审批列表…"
  emptyTitle="当前还没有待审批的报销单"
>
  <!-- 待审批列表 -->
  <app-approval-list-table 
    [items]="displayData()" 
    (approve)="handleApprove($event)" 
  />

  <!-- 分页组件 -->
  @if (totalCount() > 0) {
  <div class="expenses-pagination">
    <nz-pagination
      [nzTotal]="totalCount()"
      [nzPageIndex]="query().page"
      [nzPageSize]="query().pageSize"
      [nzPageSizeOptions]="pageSizeOptions"
      [nzShowSizeChanger]="true"
      [nzShowQuickJumper]="true"
      [nzShowTotal]="totalTpl"
      (nzPageIndexChange)="onPageIndexChange($event)"
      (nzPageSizeChange)="onPageSizeChange($event)"
    ></nz-pagination>
    <ng-template #totalTpl let-total>共 {{ total }} 条</ng-template>
  </div>
  }
</app-list-state>
