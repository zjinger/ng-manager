<app-dialog-shell
  [open]="open()"
  [width]="1080"
  [title]="project() ? project()!.name + ' · 子项目/模块管理' : '子项目/模块管理'"
  [subtitle]="'按子项目和模块结构管理配置，支持启用/停用、编辑配置、成员管理和删除等操作。'"
  [icon]="'cluster'"
  (cancel)="cancel.emit()"
>
  <div dialog-body class="module-manage-dialog">
    @if (project()) {
      <div class="project-expand">
        <app-project-submodule-structure
          [modules]="modules()"
          [modulesLoading]="busy()"
          [busy]="busy()"
          [canManageModules]="canManageModules()"
          mode="detail"
          (createModule)="openCreate()"
          (editModuleConfig)="openDetail.emit({ moduleId: $event, tab: 'basic' })"
          (manageModuleMembers)="openDetail.emit({ moduleId: $event, tab: 'members' })"
          (toggleModuleEnabled)="updateModule.emit({ id: $event.id, patch: { enabled: $event.enabled } })"
          (removeModule)="removeModule.emit($event)"
        />
      </div>
    }
  </div>
</app-dialog-shell>

<nz-modal
  [nzVisible]="createOpen()"
  nzTitle="新增子项目/模块"
  [nzOkLoading]="busy()"
  [nzOkDisabled]="!canSubmitCreate()"
  nzOkText="创建"
  nzCancelText="取消"
  (nzOnCancel)="closeCreate()"
  (nzOnOk)="submitCreate()"
>
  <ng-container *nzModalContent>
    <form nz-form [nzLayout]="'vertical'" class="create-form">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>类型</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createNodeType()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createNodeType.set($event || 'module')"
              >
                <nz-option nzLabel="子项目" nzValue="subsystem"></nz-option>
                <nz-option nzLabel="模块" nzValue="module"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>所属子项目（可选）</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createParentId()"
                [ngModelOptions]="{ standalone: true }"
                nzAllowClear
                nzPlaceHolder="选择子项目"
                [nzDisabled]="createNodeType() === 'subsystem'"
                (ngModelChange)="createParentId.set($event || null)"
              >
                @for (item of subsystemItems(); track item.id) {
                  <nz-option [nzLabel]="item.name" [nzValue]="item.id"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>名称</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="createName()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createName.set($event)"
                placeholder="输入子项目/模块名称"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        @if (createNodeType() === 'subsystem') {
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label>项目编号</nz-form-label>
              <nz-form-control>
                <input
                  nz-input
                  [ngModel]="createProjectNo()"
                  [ngModelOptions]="{ standalone: true }"
                  (ngModelChange)="createProjectNo.set($event)"
                  placeholder="例如 SL20260001，建议以 SL 开头加上日期流水"
                />
              </nz-form-control>
            </nz-form-item>
          </div>
        }
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>优先级</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createPriority()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createPriority.set($event || 'medium')"
              >
                @for (item of priorityOptions; track item.value) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>排序</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                type="number"
                min="0"
                [ngModel]="createSort()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createSort.set($event === null || $event === '' ? 0 : +$event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>启用状态</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createEnabled()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createEnabled.set($event !== false)"
              >
                <nz-option nzLabel="启用" [nzValue]="true"></nz-option>
                <nz-option nzLabel="停用" [nzValue]="false"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <textarea
                nz-input
                rows="3"
                [ngModel]="createDescription()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createDescription.set($event)"
              ></textarea>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </ng-container>
</nz-modal>
