<app-dialog-shell
  [open]="open()"
  [width]="1080"
  [title]="project() ? '子项目/模块管理 · ' + project()!.name : '子项目/模块管理'"
  [subtitle]="'子项目/模块用于按层级拆分项目范围，可配置项目编号、成员和关联研发项。'"
  [icon]="'cluster'"
  (cancel)="cancel.emit()"
>
  <div dialog-body class="module-manage-dialog">
    @if (project()) {
      <div class="project-expand">
        <app-project-submodule-structure
          [modules]="modules()"
          [modulesLoading]="busy()"
          [busy]="busy()"
          [canManageModules]="canManageModules()"
          mode="detail"
          (createModule)="openCreate()"
          (editModuleConfig)="openDetail.emit({ moduleId: $event, tab: 'basic' })"
          (manageModuleMembers)="openDetail.emit({ moduleId: $event, tab: 'members' })"
          (manageModuleRdItems)="openDetail.emit({ moduleId: $event, tab: 'rdItems' })"
          (toggleModuleEnabled)="updateModule.emit({ id: $event.id, patch: { enabled: $event.enabled } })"
          (removeModule)="removeModule.emit($event)"
        />
      </div>
    }
  </div>
</app-dialog-shell>

<app-project-module-create-dialog
  [open]="createOpen()"
  [busy]="busy()"
  [modules]="modules()"
  (cancel)="closeCreate()"
  (create)="submitCreate($event)"
/>
