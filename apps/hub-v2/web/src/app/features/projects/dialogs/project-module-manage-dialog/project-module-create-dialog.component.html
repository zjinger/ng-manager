<app-dialog-shell
  [open]="open()"
  [center]="true"
  [width]="720"
  [title]="'新增子项目/模块'"
  [subtitle]="'选择类型和上级节点后，补充基础信息完成创建。'"
  [icon]="'plus-circle'"
  [modalClass]="'project-module-create-modal'"
  (cancel)="cancel.emit()"
>
  <div dialog-body>
    <form nz-form [nzLayout]="'vertical'" class="create-form">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>类型</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createNodeType()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="onCreateNodeTypeChange($event)"
              >
                <nz-option nzLabel="子项目" nzValue="subsystem"></nz-option>
                <nz-option nzLabel="模块" nzValue="module"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>上级子项目/模块</nz-form-label>
            <nz-form-control>
              <nz-cascader
                #parentCascaderRef
                nzAllowClear
                nzPlaceHolder="不选择则作为顶层节点"
                [nzChangeOnSelect]="true"
                nzColumnClassName="project-module-parent-cascader-column"
                nzMenuClassName="project-module-parent-cascader-menu"
                [nzOptionRender]="parentOptionTpl"
                [nzOptions]="parentCascaderOptions()"
                [nzMenuStyle]="parentMenuStyle()"
                [ngModel]="createParentPath()"
                [ngModelOptions]="{ standalone: true }"
                (nzVisibleChange)="onParentCascaderVisibleChange($event)"
                (ngModelChange)="onParentPathChange($event)"
              ></nz-cascader>
              <ng-template #parentOptionTpl let-option>
                <span class="parent-module-option" [attr.data-kind]="option.kind">
                  <nz-icon [nzType]="parentOptionIcon(option)" nzTheme="outline" />
                  <span>{{ option.label }}</span>
                </span>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>名称</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="createName()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createName.set($event)"
                placeholder="输入子项目/模块名称"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>项目编号</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                [ngModel]="createProjectNo()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createProjectNo.set($event)"
                placeholder="可选，例如 SL20260001"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>优先级</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createPriority()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createPriority.set($event || 'medium')"
              >
                @for (item of priorityOptions; track item.value) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>排序</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                type="number"
                min="0"
                [ngModel]="createSort()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createSort.set($event === null || $event === '' ? 0 : +$event)"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>启用状态</nz-form-label>
            <nz-form-control>
              <nz-select
                [ngModel]="createEnabled()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createEnabled.set($event !== false)"
              >
                <nz-option nzLabel="启用" [nzValue]="true"></nz-option>
                <nz-option nzLabel="停用" [nzValue]="false"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <textarea
                nz-input
                rows="3"
                [ngModel]="createDescription()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="createDescription.set($event)"
              ></textarea>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </div>

  <ng-container dialog-footer>
    <button nz-button type="button" (click)="cancel.emit()">取消</button>
    <button
      nz-button
      nzType="primary"
      type="button"
      [disabled]="!canSubmitCreate()"
      [nzLoading]="busy()"
      (click)="submitCreate()"
    >
      创建
    </button>
  </ng-container>
</app-dialog-shell>
