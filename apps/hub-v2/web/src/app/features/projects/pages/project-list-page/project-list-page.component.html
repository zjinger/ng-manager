<app-page-header title="项目管理" [subtitle]="subtitle()" />

<app-project-filter-bar
  [viewMode]="viewMode()"
  (submit)="applyFilters($event)"
  (create)="dialogOpen.set(true)"
  (viewModeChange)="viewMode.set($event)"
  (searchSubmitted)="onSearch($event)"
/>

<app-list-state
  [loading]="store.loading()"
  [empty]="store.items().length === 0"
  loadingText="正在加载项目列表…"
  emptyTitle="当前还没有项目"
  emptyDescription="先创建一批测试项目。"
>
  @if (viewMode() === 'card') {
    <app-project-card-grid
      [items]="store.items()"
      [expandedProjectIds]="expandedProjectIds()"
      [modulePreviewMap]="modulePreviewMap()"
      [moduleLoadingIds]="previewLoadingIds()"
      [memberPreviewMap]="memberPreviewMap()"
      [memberLoadingIds]="memberPreviewLoadingIds()"
      (manageMembers)="openMembersDialog($event)"
      (manageModules)="openModuleDialog($event)"
      (editModuleConfig)="openModuleDetailFromList($event.project, $event.moduleId, 'basic')"
      (manageModuleMembers)="openModuleDetailFromList($event.project, $event.moduleId, 'members')"
      (edit)="openEditDialog($event)"
      (manageConfig)="openConfigDialog($event)"
      (archive)="archiveProject($event)"
      (restore)="restoreProject($event)"
      (toggleExpand)="toggleProjectExpand($event)"
    />
  } @else {
    <app-project-list-table
      [items]="store.items()"
      [expandedProjectIds]="expandedProjectIds()"
      [modulePreviewMap]="modulePreviewMap()"
      [moduleLoadingIds]="previewLoadingIds()"
      [memberPreviewMap]="memberPreviewMap()"
      [memberLoadingIds]="memberPreviewLoadingIds()"
      (manageMembers)="openMembersDialog($event)"
      (manageModules)="openModuleDialog($event)"
      (editModuleConfig)="openModuleDetailFromList($event.project, $event.moduleId, 'basic')"
      (manageModuleMembers)="openModuleDetailFromList($event.project, $event.moduleId, 'members')"
      (edit)="openEditDialog($event)"
      (manageConfig)="openConfigDialog($event)"
      (archive)="archiveProject($event)"
      (restore)="restoreProject($event)"
      (toggleExpand)="toggleProjectExpand($event)"
    />
  }
</app-list-state>

<app-project-create-dialog
  [open]="dialogOpen()"
  [busy]="store.busy()"
  (cancel)="dialogOpen.set(false)"
  (create)="createProject($event)"
/>

<app-project-edit-dialog
  [open]="editDialogOpen()"
  [busy]="editBusy()"
  [project]="selectedProject()"
  [canEditProjects]="isProjectAdmin()"
  (cancel)="editDialogOpen.set(false)"
  (save)="saveProject($event)"
/>

<app-project-config-dialog
  [open]="configDialogOpen()"
  [busy]="configBusy() || configLoading()"
  [project]="configProject()"
  [environments]="environments()"
  [versions]="versions()"
  [stages]="stages()"
  [apiTokens]="apiTokens()"
  [latestCreatedToken]="latestCreatedToken()"
  [pendingEnvironmentIds]="pendingEnvironmentIds()"
  [pendingVersionIds]="pendingVersionIds()"
  [pendingStageIds]="pendingStageIds()"
  [pendingTokenIds]="pendingTokenIds()"
  [canManageConfig]="isProjectAdmin()"
  (cancel)="closeConfigDialog()"
  (createEnvironment)="createEnvironment($event)"
  (updateEnvironment)="updateEnvironment($event)"
  (removeEnvironment)="removeEnvironment($event)"
  (createVersion)="createVersion($event)"
  (updateVersion)="updateVersion($event)"
  (removeVersion)="removeVersion($event)"
  (createStage)="createStage($event)"
  (updateStage)="updateStage($event)"
  (removeStage)="removeStage($event)"
  (createApiToken)="createApiToken($event)"
  (revokeApiToken)="revokeApiToken($event)"
  (copyLatestToken)="copyLatestToken($event)"
  (clearLatestToken)="clearLatestCreatedToken()"
/>

<app-project-module-manage-dialog
  [open]="moduleDialogOpen()"
  [busy]="moduleBusy() || moduleLoading()"
  [project]="moduleProject()"
  [modules]="modules()"
  [canManageModules]="isProjectAdmin()"
  (cancel)="closeModuleDialog()"
  (createModule)="createModule($event)"
  (updateModule)="updateModule($event)"
  (removeModule)="removeModule($event)"
  (openDetail)="openModuleDetailDialog($event.moduleId, $event.tab)"
/>

<app-project-module-detail-dialog
  [open]="moduleDetailDialogOpen()"
  [initialTab]="moduleDetailInitialTab()"
  [busy]="moduleBusy()"
  [membersBusy]="moduleMembersBusy()"
  [module]="selectedModule()"
  [projectMembers]="members()"
  [moduleMembers]="moduleMembers()"
  [canManageModules]="isProjectAdmin()"
  (cancel)="closeModuleDetailDialog()"
  (save)="saveModuleDetail($event)"
  (addMember)="addModuleMember($event)"
  (removeMember)="removeModuleMember($event)"
/>

<app-project-members-dialog
  [open]="membersDialogOpen()"
  [project]="selectedProject()"
  [members]="members()"
  [users]="users()"
  [loading]="membersLoading()"
  [busy]="membersBusy()"
  [canTransferOwner]="canTransferOwner()"
  [canPromoteAdmin]="canPromoteAdmin()"
  [canManageMembers]="isProjectAdmin()"
  (cancel)="closeMembersDialog()"
  (add)="addMember($event)"
  (promoteAdmin)="promoteMemberAdmin($event)"
  (revokeAdmin)="revokeMemberAdmin($event)"
  (transferOwner)="transferOwner($event)"
  (remove)="removeMember($event)"
/>
