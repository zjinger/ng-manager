<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub v2 — 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-50: #EEF2FF; --primary-100: #E0E7FF; --primary-200: #C7D2FE;
      --primary-300: #A5B4FC; --primary-400: #818CF8; --primary-500: #6366F1;
      --primary-600: #4F46E5; --primary-700: #4338CA; --primary-800: #3730A3; --primary-900: #312E81;
      --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0; --gray-300: #CBD5E1;
      --gray-400: #94A3B8; --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155;
      --gray-800: #1E293B; --gray-900: #0F172A;
      --danger: #EF4444; --success: #10B981;
      --border-radius: 8px; --border-radius-sm: 6px;
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
      --transition: all 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--gray-50); color: var(--gray-800); font-size: 14px; line-height: 1.5;
      min-height: 100vh; display: flex;
    }

    /* ===== Left Panel ===== */
    .login-left {
      flex: 1;
      background: linear-gradient(145deg, var(--gray-900) 0%, #1a1640 50%, var(--primary-900) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative grid dots */
    .login-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Floating orbs */
    .login-left .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
    }
    .login-left .orb-1 {
      width: 300px; height: 300px;
      background: var(--primary-500);
      top: -80px; right: -60px;
    }
    .login-left .orb-2 {
      width: 200px; height: 200px;
      background: #8B5CF6;
      bottom: -40px; left: -40px;
    }
    .login-left .orb-3 {
      width: 150px; height: 150px;
      background: #06B6D4;
      top: 50%; left: 60%;
    }

    .brand-block {
      position: relative; z-index: 1;
      text-align: center;
    }

    .brand-icon-large {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 32px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
    }

    .brand-title {
      font-size: 36px; font-weight: 700; color: #fff;
      letter-spacing: -0.5px; margin-bottom: 8px;
      display: flex; align-items: baseline; justify-content: center; gap: 10px;
    }
    .brand-title .version {
      font-size: 14px; padding: 3px 10px;
      background: rgba(99, 102, 241, 0.3);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px; color: var(--primary-300);
      font-weight: 500;
    }

    .brand-subtitle {
      font-size: 16px; color: var(--gray-400);
      letter-spacing: 2px;
    }

    .brand-features {
      margin-top: 48px; display: flex; gap: 40px;
      position: relative; z-index: 1;
    }
    .brand-feature {
      text-align: center; color: var(--gray-400);
    }
    .brand-feature i {
      font-size: 20px; color: var(--primary-400);
      margin-bottom: 8px; display: block;
    }
    .brand-feature span { font-size: 13px; }

    /* ===== Right Panel ===== */
    .login-right {
      width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: #fff;
      flex-shrink: 0;
    }

    .login-form-wrap {
      width: 100%; max-width: 360px;
    }

    .login-greeting {
      margin-bottom: 32px;
    }
    .login-greeting h2 {
      font-size: 24px; font-weight: 700; color: var(--gray-900);
      letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .login-greeting p {
      font-size: 14px; color: var(--gray-500);
    }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px; font-weight: 500; color: var(--gray-700);
      margin-bottom: 6px;
    }

    .form-input-wrap {
      position: relative;
    }
    .form-input-wrap .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); font-size: 14px; pointer-events: none;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1px solid var(--gray-200);
      border-radius: var(--border-radius-sm);
      font-size: 14px; color: var(--gray-800);
      transition: var(--transition);
      font-family: inherit;
      height: 42px;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary-400);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .form-input::placeholder { color: var(--gray-400); }

    .form-input-wrap .toggle-pw {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--gray-400);
      cursor: pointer; font-size: 14px; padding: 4px;
      transition: var(--transition);
    }
    .form-input-wrap .toggle-pw:hover { color: var(--gray-600); }

    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; color: var(--gray-600);
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--primary-600);
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px; color: var(--primary-600);
      text-decoration: none; font-weight: 500;
      transition: var(--transition);
    }
    .forgot-link:hover { color: var(--primary-700); }

    .btn-login {
      width: 100%; height: 44px;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      color: #fff; border: none;
      border-radius: var(--border-radius-sm);
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, var(--primary-700), var(--primary-800));
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
      transform: translateY(-1px);
    }
    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3);
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: var(--gray-400); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--gray-200);
    }

    .sso-btns {
      display: flex; gap: 10px;
    }
    .sso-btn {
      flex: 1; height: 40px;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--border-radius-sm);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 13px; color: var(--gray-700); font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }
    .sso-btn:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
    }
    .sso-btn i { font-size: 16px; }

    .login-footer {
      margin-top: 32px; text-align: center;
      font-size: 12px; color: var(--gray-400);
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .login-left {
        min-height: 240px; padding: 32px;
      }
      .brand-features { display: none; }
      .login-right {
        width: 100%; padding: 32px;
      }
    }

    /* ===== Error shake ===== */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
    .form-error {
      font-size: 12px; color: var(--danger);
      margin-top: 4px; display: none;
    }
    .form-error.show { display: block; }

    /* ===== Loading spinner ===== */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Left: Branding -->
  <div class="login-left">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="brand-block">
      <div class="brand-icon-large"><i class="fas fa-cube"></i></div>
      <div class="brand-title">
        Hub
        <span class="version">v2</span>
      </div>
      <div class="brand-subtitle">内 网 协 作 平 台</div>
    </div>

    <div class="brand-features">
      <div class="brand-feature">
        <i class="fas fa-bug"></i>
        <span>Issue 追踪</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-code-branch"></i>
        <span>研发管理</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-file-alt"></i>
        <span>文档协作</span>
      </div>
      <div class="brand-feature">
        <i class="fas fa-chart-bar"></i>
        <span>数据看板</span>
      </div>
    </div>
  </div>

  <!-- Right: Login Form -->
  <div class="login-right">
    <div class="login-form-wrap">
      <div class="login-greeting">
        <h2>欢迎回来 👋</h2>
        <p>登录你的账号以继续使用 Hub</p>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名 / 邮箱</label>
          <div class="form-input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" autocomplete="username" />
          </div>
          <div class="form-error" id="userError">请输入用户名或邮箱</div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="form-input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword()">
              <i class="fas fa-eye" id="pwEyeIcon"></i>
            </button>
          </div>
          <div class="form-error" id="pwError">请输入密码</div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" checked />
            <span>记住登录状态</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">登 录</span>
          <div class="spinner" id="loginSpinner"></div>
          <i class="fas fa-arrow-right btn-icon"></i>
        </button>
      </form>

      <div class="divider">或使用以下方式登录</div>

      <div class="sso-btns">
        <button class="sso-btn" type="button">
          <i class="fab fa-microsoft" style="color:#00A4EF;"></i>
          <span>企业 SSO</span>
        </button>
        <button class="sso-btn" type="button">
          <i class="fas fa-qrcode" style="color:var(--gray-600);"></i>
          <span>扫码登录</span>
        </button>
      </div>

      <div class="login-footer">
        © 2026 Hub v2 · 内网协作平台 · v2.3.1
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('pwEyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username');
      const pw = document.getElementById('password');
      const userErr = document.getElementById('userError');
      const pwErr = document.getElementById('pwError');
      let valid = true;

      // Reset
      userErr.classList.remove('show');
      pwErr.classList.remove('show');
      user.parentElement.classList.remove('shake');
      pw.parentElement.classList.remove('shake');

      if (!user.value.trim()) {
        userErr.classList.add('show');
        user.parentElement.classList.add('shake');
        valid = false;
      }
      if (!pw.value) {
        pwErr.classList.add('show');
        pw.parentElement.classList.add('shake');
        valid = false;
      }

      if (!valid) return false;

      // Simulate loading
      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnIcon = btn.querySelector('.btn-icon');
      const spinner = document.getElementById('loginSpinner');

      btnText.textContent = '登录中…';
      btnIcon.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;
      btn.style.opacity = '0.85';

      // Simulate redirect
      setTimeout(() => {
        btnText.textContent = '✓ 登录成功';
        spinner.style.display = 'none';
        btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      }, 1500);

      return false;
    }
  </script>
</body>
</html>
