<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>功能点进度管理</title>
  <style>
    :root {
      --bg-page: #f5f7fb;
      --bg-container: #ffffff;
      --bg-subtle: #f7f9fc;
      --border-color: #d9e0ea;
      --border-color-soft: #edf1f7;
      --text-heading: #172033;
      --text-body: #344054;
      --text-muted: #667085;
      --primary-600: #2563eb;
      --primary-50: #eff6ff;
      --success-600: #16a34a;
      --success-50: #f0fdf4;
      --warning-600: #d97706;
      --warning-50: #fffbeb;
      --neutral-600: #475467;
      --danger-600: #dc2626;
      --shadow-card: 0 1px 2px rgba(16, 24, 40, .05);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-body);
      background: var(--bg-page);
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .page { max-width: 1440px; margin: 0 auto; padding: 20px 24px 32px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .title-wrap h1 { margin: 0 0 6px; font-size: 22px; line-height: 30px; color: var(--text-heading); font-weight: 650; }
    .subtitle { color: var(--text-muted); font-size: 13px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 32px; padding: 0 12px; border: 1px solid var(--border-color);
      border-radius: 6px; background: var(--bg-container); color: var(--text-body);
    }
    .btn:hover { background: var(--bg-subtle); }
    .btn-primary { background: var(--primary-600); color: #fff; border-color: var(--primary-600); }
    .btn-primary:hover { filter: brightness(.96); background: var(--primary-600); }
    .btn-danger { color: var(--danger-600); }
    .btn[disabled] { opacity: .48; cursor: not-allowed; }

    .stats {
      display: grid; grid-template-columns: 1.35fr repeat(4, 1fr); gap: 12px;
      margin-bottom: 12px;
    }
    .stat-card {
      min-height: 76px; padding: 12px 14px; background: var(--bg-container);
      border: 1px solid var(--border-color-soft); border-radius: var(--radius); box-shadow: var(--shadow-card);
    }
    .stat-label { color: var(--text-muted); font-size: 12px; margin-bottom: 8px; }
    .stat-value { color: var(--text-heading); font-size: 24px; font-weight: 650; line-height: 1; }
    .stat-value.small { font-size: 22px; }
    .stat-foot { margin-top: 9px; color: var(--text-muted); font-size: 12px; }
    .progress-track { height: 6px; border-radius: 99px; background: #eef2f7; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--primary-600); }

    .toolbar {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 12px; margin-bottom: 12px; background: var(--bg-container);
      border: 1px solid var(--border-color-soft); border-radius: var(--radius); box-shadow: var(--shadow-card);
    }
    .filters { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; }
    .search { flex: 1; min-width: 320px; }
    .field {
      height: 32px; width: 100%; border: 1px solid var(--border-color); border-radius: 6px;
      padding: 0 10px; background: #fff; color: var(--text-body); outline: none;
    }
    .field:focus { border-color: var(--primary-600); box-shadow: 0 0 0 3px rgba(37, 99, 235, .10); }
    select.field { width: 150px; }

    .panel {
      background: var(--bg-container); border: 1px solid var(--border-color-soft);
      border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden;
    }
    .panel-head {
      display: grid; grid-template-columns: 32px 1fr 120px 120px 120px 160px;
      padding: 10px 14px; background: var(--bg-subtle); color: var(--text-muted); font-size: 12px;
      border-bottom: 1px solid var(--border-color-soft);
    }
    .row {
      display: grid; grid-template-columns: 32px 1fr 120px 120px 120px 160px;
      align-items: center; min-height: 48px; padding: 8px 14px; border-bottom: 1px solid var(--border-color-soft);
    }
    .row:last-child { border-bottom: 0; }
    .row.module { background: #fff; font-weight: 600; color: var(--text-heading); }
    .row.submodule { background: #fbfcfe; }
    .row.feature { grid-template-columns: 32px minmax(280px, 1fr) 120px 180px 110px minmax(180px, 260px) 118px; }
    .panel-head.feature-head { grid-template-columns: 32px minmax(280px, 1fr) 120px 180px 110px minmax(180px, 260px) 118px; }
    .toggle { width: 24px; height: 24px; border: 0; background: transparent; color: var(--text-muted); border-radius: 4px; }
    .toggle:hover { background: var(--bg-subtle); }
    .name { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .indent-1 { padding-left: 18px; }
    .indent-2 { padding-left: 40px; }
    .meta { color: var(--text-muted); font-size: 12px; }
    .badge { display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 99px; font-size: 12px; white-space: nowrap; }
    .badge.done { color: var(--success-600); background: var(--success-50); }
    .badge.doing { color: var(--warning-600); background: var(--warning-50); }
    .badge.todo { color: var(--neutral-600); background: #f2f4f7; }
    .inline-progress { display: flex; align-items: center; gap: 8px; }
    .inline-progress .progress-track { flex: 1; margin: 0; min-width: 80px; }
    .actions { display: flex; gap: 6px; justify-content: flex-end; }
    .link-btn { border: 0; background: transparent; color: var(--primary-600); padding: 4px 2px; }
    .link-btn.danger { color: var(--danger-600); }
    .remark { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .empty, .state-card {
      padding: 44px 20px; text-align: center; color: var(--text-muted); background: var(--bg-container);
      border: 1px solid var(--border-color-soft); border-radius: var(--radius);
    }
    .empty h3, .state-card h3 { color: var(--text-heading); margin: 10px 0 6px; font-size: 16px; }
    .state-switcher { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 0; }
    .state-switcher .btn.active { color: var(--primary-600); border-color: var(--primary-600); background: var(--primary-50); }

    .drawer-mask { position: fixed; inset: 0; background: rgba(15, 23, 42, .28); display: none; z-index: 10; }
    .drawer { position: fixed; top: 0; right: 0; width: 480px; max-width: 100%; height: 100%; background: #fff; box-shadow: -8px 0 24px rgba(15,23,42,.16); transform: translateX(100%); transition: .2s ease; z-index: 11; display: flex; flex-direction: column; }
    body.drawer-open .drawer-mask { display: block; }
    body.drawer-open .drawer { transform: translateX(0); }
    .drawer-head { padding: 18px 20px; border-bottom: 1px solid var(--border-color-soft); display: flex; align-items: center; justify-content: space-between; }
    .drawer-head h2 { margin: 0; font-size: 18px; color: var(--text-heading); }
    .drawer-body { padding: 18px 20px; overflow: auto; display: grid; gap: 14px; }
    .form-row label { display: block; color: var(--text-heading); font-size: 13px; margin-bottom: 6px; }
    textarea.field { height: 82px; padding-top: 8px; resize: vertical; }
    .drawer-foot { margin-top: auto; padding: 14px 20px; border-top: 1px solid var(--border-color-soft); display: flex; justify-content: flex-end; gap: 8px; }

    .hidden { display: none !important; }
    .skeleton { height: 14px; border-radius: 99px; background: linear-gradient(90deg, #eef2f7 25%, #f8fafc 37%, #eef2f7 63%); background-size: 400% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .toolbar { align-items: stretch; flex-direction: column; }
      .filters { flex-wrap: wrap; }
      .search { min-width: 100%; }
      select.field { flex: 1; width: auto; }
      .panel { overflow-x: auto; }
      .panel-head, .row { min-width: 920px; }
      .panel-head.feature-head, .row.feature { min-width: 1080px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar" id="topbar">
      <div class="title-wrap">
        <h1>功能点进度管理</h1>
        <div class="subtitle" id="projectSubtitle">当前项目：智慧园区运营平台</div>
      </div>
      <button class="btn" onclick="setState('loading')">↻ 刷新</button>
    </section>

    <section class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">整体完成率</div>
        <div class="stat-value">68%</div>
        <div class="progress-track"><div class="progress-fill" style="width:68%"></div></div>
      </div>
      <div class="stat-card"><div class="stat-label">功能点总数</div><div class="stat-value small">25</div><div class="stat-foot">已纳入台账</div></div>
      <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value small">17</div><div class="stat-foot">状态为已完成</div></div>
      <div class="stat-card"><div class="stat-label">进行中</div><div class="stat-value small">6</div><div class="stat-foot">需要持续跟进</div></div>
      <div class="stat-card"><div class="stat-label">未开始</div><div class="stat-value small">2</div><div class="stat-foot">尚未启动</div></div>
    </section>

    <section class="toolbar" id="toolbar">
      <div class="filters">
        <input class="field search" id="keyword" placeholder="搜索模块、子模块、功能点、负责人或备注" oninput="applyFilter()" />
        <select class="field" id="moduleFilter" onchange="applyFilter()">
          <option value="">全部模块</option><option>账号与权限</option><option>设备管理</option><option>工单中心</option>
        </select>
        <select class="field" id="statusFilter" onchange="applyFilter()">
          <option value="">全部状态</option><option value="已完成">已完成</option><option value="进行中">进行中</option><option value="未开始">未开始</option>
        </select>
      </div>
      <button class="btn btn-primary manage-only" onclick="openDrawer('新增功能点')">＋ 新增功能点</button>
    </section>

    <section id="content"></section>

    <div class="state-switcher">
      <button class="btn active" onclick="setState('data', this)">有功能点</button>
      <button class="btn" onclick="setState('noProject', this)">未选择项目</button>
      <button class="btn" onclick="setState('loading', this)">加载中</button>
      <button class="btn" onclick="setState('error', this)">加载失败</button>
      <button class="btn" onclick="setState('empty', this)">无功能点</button>
      <button class="btn" onclick="setState('readonly', this)">无管理权限</button>
    </div>
  </main>

  <div class="drawer-mask" onclick="closeDrawer()"></div>
  <aside class="drawer" aria-modal="true" role="dialog">
    <div class="drawer-head">
      <h2 id="drawerTitle">新增功能点</h2>
      <button class="btn" onclick="closeDrawer()">关闭</button>
    </div>
    <div class="drawer-body">
      <div class="form-row"><label>模块</label><input class="field" value="设备管理" /></div>
      <div class="form-row"><label>子模块</label><input class="field" value="设备台账" /></div>
      <div class="form-row"><label>功能点名称</label><input class="field" value="设备批量导入" /></div>
      <div class="form-row"><label>负责人</label><input class="field" value="陈磊" /></div>
      <div class="form-row"><label>状态</label><select class="field"><option>未开始</option><option selected>进行中</option><option>已完成</option></select></div>
      <div class="form-row"><label>进度</label><input class="field" type="number" value="60" min="0" max="100" /></div>
      <div class="form-row"><label>排序</label><input class="field" type="number" value="10" /></div>
      <div class="form-row"><label>备注</label><textarea class="field">接口联调中，导入失败明细待补充。</textarea></div>
    </div>
    <div class="drawer-foot">
      <button class="btn" onclick="closeDrawer()">取消</button>
      <button class="btn btn-primary" onclick="closeDrawer()">保存</button>
    </div>
  </aside>

  <script>
    const data = [
      { module: '账号与权限', submodules: [
        { name: '登录认证', features: [
          { name:'账号密码登录', owner:'李明', progress:100, status:'已完成', remark:'已完成联调与验收' },
          { name:'忘记密码', owner:'李明', progress:80, status:'进行中', remark:'短信验证码限制待确认' }
        ]},
        { name: '角色权限', features: [
          { name:'角色列表维护', owner:'王敏', progress:100, status:'已完成', remark:'支持新增、编辑、停用' },
          { name:'菜单权限配置', owner:'王敏', progress:60, status:'进行中', remark:'权限保存接口联调中' }
        ]}
      ]},
      { module: '设备管理', submodules: [
        { name: '设备台账', features: [
          { name:'设备列表查询', owner:'陈磊', progress:100, status:'已完成', remark:'基础筛选已完成' },
          { name:'设备批量导入', owner:'陈磊', progress:60, status:'进行中', remark:'导入失败明细待补充' },
          { name:'设备详情', owner:'赵婷', progress:0, status:'未开始', remark:'等待字段口径确认' }
        ]},
        { name: '设备告警', features: [
          { name:'告警规则配置', owner:'赵婷', progress:40, status:'进行中', remark:'规则条件编辑中' }
        ]}
      ]},
      { module: '工单中心', submodules: [
        { name: '工单处理', features: [
          { name:'工单派发', owner:'周航', progress:100, status:'已完成', remark:'已上线试运行' },
          { name:'处理记录', owner:'周航', progress:0, status:'未开始', remark:'排期下周启动' }
        ]}
      ]}
    ];

    let readonly = false;
    let collapsed = new Set();

    function rate(items) {
      const list = items.flatMap(x => x.features || [x]);
      if (!list.length) return 0;
      return Math.round(list.reduce((s, i) => s + i.progress, 0) / list.length);
    }
    function statusClass(status) { return status === '已完成' ? 'done' : status === '进行中' ? 'doing' : 'todo'; }
    function badge(status) { return `<span class="badge ${statusClass(status)}">${status}</span>`; }

    function render(list = data) {
      const content = document.getElementById('content');
      if (!list.length) {
        content.innerHTML = `<div class="empty"><div>⌕</div><h3>暂无匹配结果</h3><p>请调整搜索关键词、模块或状态筛选条件。</p></div>`;
        return;
      }
      let html = `<div class="panel"><div class="panel-head"><span></span><span>模块 / 子模块</span><span>子模块数</span><span>功能点数</span><span>完成率</span><span></span></div>`;
      list.forEach(m => {
        const moduleFeatures = m.submodules.flatMap(s => s.features);
        const mKey = 'm-' + m.module;
        const mClosed = collapsed.has(mKey);
        html += `<div class="row module"><button class="toggle" onclick="toggle('${mKey}')">${mClosed ? '›' : '⌄'}</button><div class="name">${m.module}</div><div>${m.submodules.length}</div><div>${moduleFeatures.length}</div><div class="inline-progress"><div class="progress-track"><div class="progress-fill" style="width:${rate(moduleFeatures)}%"></div></div><span>${rate(moduleFeatures)}%</span></div><div></div></div>`;
        if (!mClosed) m.submodules.forEach(s => {
          const sKey = 's-' + m.module + '-' + s.name;
          const sClosed = collapsed.has(sKey);
          html += `<div class="row submodule"><button class="toggle" onclick="toggle('${sKey}')">${sClosed ? '›' : '⌄'}</button><div class="name indent-1">${s.name}</div><div class="meta">—</div><div>${s.features.length}</div><div class="inline-progress"><div class="progress-track"><div class="progress-fill" style="width:${rate(s.features)}%"></div></div><span>${rate(s.features)}%</span></div><div></div></div>`;
          if (!sClosed) {
            html += `<div class="panel-head feature-head"><span></span><span>功能点名称</span><span>负责人</span><span>进度</span><span>状态</span><span>备注</span><span>操作</span></div>`;
            s.features.forEach(f => {
              html += `<div class="row feature" data-text="${m.module} ${s.name} ${f.name} ${f.owner} ${f.remark} ${f.status}"><span></span><div class="name indent-2">${f.name}</div><div>${f.owner}</div><div class="inline-progress"><div class="progress-track"><div class="progress-fill" style="width:${f.progress}%"></div></div><span>${f.progress}%</span></div><div>${badge(f.status)}</div><div class="remark" title="${f.remark}">${f.remark}</div><div class="actions"><button class="link-btn manage-only" onclick="openDrawer('编辑功能点')">编辑</button><button class="link-btn danger manage-only">删除</button><span class="meta read-only hidden">只读</span></div></div>`;
            });
          }
        });
      });
      html += `</div>`;
      content.innerHTML = html;
      applyReadonly();
    }

    function toggle(key) { collapsed.has(key) ? collapsed.delete(key) : collapsed.add(key); applyFilter(); }
    function openDrawer(title) { if (readonly) return; document.getElementById('drawerTitle').textContent = title; document.body.classList.add('drawer-open'); }
    function closeDrawer() { document.body.classList.remove('drawer-open'); }
    function applyReadonly() {
      document.querySelectorAll('.manage-only').forEach(el => el.classList.toggle('hidden', readonly));
      document.querySelectorAll('.read-only').forEach(el => el.classList.toggle('hidden', !readonly));
    }
    function applyFilter() {
      const kw = document.getElementById('keyword').value.trim().toLowerCase();
      const mf = document.getElementById('moduleFilter').value;
      const sf = document.getElementById('statusFilter').value;
      const filtered = data.map(m => ({
        ...m,
        submodules: m.submodules.map(s => ({
          ...s,
          features: s.features.filter(f => {
            const text = `${m.module} ${s.name} ${f.name} ${f.owner} ${f.remark}`.toLowerCase();
            return (!mf || m.module === mf) && (!sf || f.status === sf) && (!kw || text.includes(kw));
          })
        })).filter(s => s.features.length)
      })).filter(m => m.submodules.length);
      render(filtered);
    }
    function setState(state, btn) {
      if (btn) { document.querySelectorAll('.state-switcher .btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
      readonly = state === 'readonly';
      document.getElementById('stats').classList.toggle('hidden', state === 'noProject');
      document.getElementById('toolbar').classList.toggle('hidden', state === 'noProject' || state === 'loading' || state === 'error');
      const content = document.getElementById('content');
      if (state === 'noProject') content.innerHTML = `<div class="state-card"><h3>未选择项目</h3><p>请选择一个项目后维护功能点进度。</p></div>`;
      else if (state === 'loading') content.innerHTML = `<div class="panel"><div class="row"><span></span><div class="skeleton" style="width:70%"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><span></span></div><div class="row"><span></span><div class="skeleton" style="width:52%"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><span></span></div></div>`;
      else if (state === 'error') content.innerHTML = `<div class="state-card"><h3>加载失败</h3><p>功能点数据获取失败，请刷新后重试。</p><button class="btn" onclick="setState('loading')">重新加载</button></div>`;
      else if (state === 'empty') content.innerHTML = `<div class="empty"><div>＋</div><h3>暂无功能点</h3><p>可新增功能点开始维护当前项目台账。</p><button class="btn btn-primary manage-only" onclick="openDrawer('新增功能点')">新增功能点</button></div>`;
      else render();
      applyReadonly();
    }
    render();
  </script>
</body>
</html>
