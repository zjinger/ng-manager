<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub V2 Mobile — 待办列表</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --primary-dark: #4F46E5;
      --bg: #0F1117;
      --surface: #161822;
      --surface-elevated: #1C1F2E;
      --text: #E4E6ED;
      --text-secondary: #8B8FA3;
      --text-muted: #5C5F73;
      --border: #252836;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
      --radius-card: 16px;
      --radius-badge: 8px;
      --tab-height: 56px;
      --header-height: 56px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      border: 3px solid #2A2D3A;
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-bar-right { display: flex; gap: 6px; }
    .header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 0 16px 12px;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-chip.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      color: var(--primary-light);
    }

    .scroll-content {
      height: calc(844px - 44px - var(--header-height) - 42px - var(--tab-height));
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* Todo cards */
    .todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .todo-card:hover { border-color: rgba(99,102,241,0.3); }
    .todo-type-badge {
      padding: 3px 8px;
      border-radius: var(--radius-badge);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      height: fit-content;
      flex-shrink: 0;
    }
    .todo-type-badge.issue {
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
    }
    .todo-type-badge.rd {
      background: rgba(16,185,129,0.15);
      color: var(--success);
    }
    .todo-type-badge.review {
      background: rgba(245,158,11,0.15);
      color: var(--warning);
    }
    .todo-info { flex: 1; min-width: 0; }
    .todo-id {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
      margin-bottom: 2px;
    }
    .todo-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .todo-status {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }
    .todo-status.in-progress { background: rgba(99,102,241,0.12); color: var(--primary-light); }
    .todo-status.open { background: rgba(59,130,246,0.12); color: var(--info); }
    .todo-status.blocked { background: rgba(239,68,68,0.12); color: var(--danger); }
    .todo-progress {
      font-size: 12px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .todo-assignee {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Tab bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--tab-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      cursor: pointer;
    }
    .tab-item-icon { font-size: 20px; color: var(--text-muted); line-height: 1; }
    .tab-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .tab-item.active .tab-item-icon { color: var(--primary-light); }
    .tab-item.active .tab-item-label { color: var(--primary-light); }
    .tab-badge {
      position: absolute;
      top: -2px;
      right: -6px;
      min-width: 16px;
      height: 16px;
      background: var(--danger);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .tab-icon-wrap { position: relative; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-right"><span>⦿</span><span>⦿</span><span>⦿</span></div>
    </div>
    <div class="header">
      <div class="header-title">待办</div>
    </div>

    <div class="filter-bar">
      <button class="filter-chip active">全部</button>
      <button class="filter-chip">Issue</button>
      <button class="filter-chip">研发项</button>
      <button class="filter-chip">待验证</button>
    </div>

    <div class="scroll-content">
      <!-- Issue cards -->
      <div class="todo-card">
        <span class="todo-type-badge issue">Issue</span>
        <div class="todo-info">
          <div class="todo-id">NGM-042</div>
          <div class="todo-title">登录接口偶发500错误</div>
          <div class="todo-meta">
            <span class="todo-status in-progress">进行中</span>
            <span class="todo-assignee">张明</span>
          </div>
        </div>
      </div>

      <div class="todo-card">
        <span class="todo-type-badge issue">Issue</span>
        <div class="todo-info">
          <div class="todo-id">NGM-039</div>
          <div class="todo-title">文件上传超时未提示错误信息</div>
          <div class="todo-meta">
            <span class="todo-status open">待处理</span>
            <span class="todo-assignee">李伟</span>
          </div>
        </div>
      </div>

      <!-- RD card -->
      <div class="todo-card">
        <span class="todo-type-badge rd">研发项</span>
        <div class="todo-info">
          <div class="todo-id">RDI-018</div>
          <div class="todo-title">用户权限模块重构</div>
          <div class="todo-meta">
            <span class="todo-status in-progress">进行中</span>
            <span class="todo-progress">60%</span>
          </div>
        </div>
      </div>

      <div class="todo-card">
        <span class="todo-type-badge rd">研发项</span>
        <div class="todo-info">
          <div class="todo-id">RDI-021</div>
          <div class="todo-title">WebSocket 重连机制优化</div>
          <div class="todo-meta">
            <span class="todo-status in-progress">进行中</span>
            <span class="todo-progress">75%</span>
          </div>
        </div>
      </div>

      <!-- Review card -->
      <div class="todo-card">
        <span class="todo-type-badge review">待验证</span>
        <div class="todo-info">
          <div class="todo-id">NGM-035</div>
          <div class="todo-title">消息推送延迟问题修复</div>
          <div class="todo-meta">
            <span class="todo-status open">待验证</span>
            <span class="todo-assignee">王芳</span>
          </div>
        </div>
      </div>

      <div class="todo-card">
        <span class="todo-type-badge issue">Issue</span>
        <div class="todo-info">
          <div class="todo-id">NGM-044</div>
          <div class="todo-title">项目切换后数据未刷新</div>
          <div class="todo-meta">
            <span class="todo-status blocked">已阻塞</span>
            <span class="todo-assignee">赵强</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon-wrap"><span class="tab-item-icon">🏠</span></div>
        <span class="tab-item-label">工作台</span>
      </div>
      <div class="tab-item active">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">📋</span>
          <span class="tab-badge">16</span>
        </div>
        <span class="tab-item-label">待办</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">💬</span>
          <span class="tab-badge">3</span>
        </div>
        <span class="tab-item-label">消息</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap"><span class="tab-item-icon">👤</span></div>
        <span class="tab-item-label">我的</span>
      </div>
    </div>
  </div>
</body>
</html>
