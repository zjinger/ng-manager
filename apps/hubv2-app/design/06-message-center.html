<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub V2 Mobile — 消息中心</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --primary-dark: #4F46E5;
      --bg: #0F1117;
      --surface: #161822;
      --surface-elevated: #1C1F2E;
      --text: #E4E6ED;
      --text-secondary: #8B8FA3;
      --text-muted: #5C5F73;
      --border: #252836;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
      --radius-card: 16px;
      --radius-badge: 8px;
      --tab-height: 56px;
      --header-height: 56px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      border: 3px solid #2A2D3A;
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-bar-right { display: flex; gap: 6px; }
    .header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }
    .header-action {
      font-size: 13px;
      color: var(--primary-light);
      cursor: pointer;
    }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 0 16px 12px;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-chip.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      color: var(--primary-light);
    }

    .scroll-content {
      height: calc(844px - 44px - var(--header-height) - 42px - var(--tab-height));
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* Message cards */
    .msg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .msg-card:hover { border-color: rgba(99,102,241,0.3); }
    .msg-card.unread { border-left: 3px solid var(--primary); }
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .msg-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .msg-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .msg-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 6px;
    }
    .msg-tag.issue { background: rgba(99,102,241,0.12); color: var(--primary-light); }
    .msg-tag.rd { background: rgba(16,185,129,0.12); color: var(--success); }
    .msg-tag.announce { background: rgba(245,158,11,0.12); color: var(--warning); }

    /* Tab bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--tab-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      cursor: pointer;
    }
    .tab-item-icon { font-size: 20px; color: var(--text-muted); line-height: 1; }
    .tab-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .tab-item.active .tab-item-icon { color: var(--primary-light); }
    .tab-item.active .tab-item-label { color: var(--primary-light); }
    .tab-badge {
      position: absolute;
      top: -2px;
      right: -6px;
      min-width: 16px;
      height: 16px;
      background: var(--danger);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .tab-icon-wrap { position: relative; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-right"><span>⦿</span><span>⦿</span><span>⦿</span></div>
    </div>
    <div class="header">
      <div class="header-title">消息</div>
      <div class="header-action">全部已读</div>
    </div>

    <div class="filter-bar">
      <button class="filter-chip active">全部</button>
      <button class="filter-chip">Issue</button>
      <button class="filter-chip">研发</button>
      <button class="filter-chip">公告</button>
    </div>

    <div class="scroll-content">
      <div class="msg-card unread">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#6366F1,#4F46E5)">李</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-name">李伟</span>
            <span class="msg-time">5 分钟前</span>
          </div>
          <div class="msg-text">指派了 Issue 给你：NGM-042 登录接口偶发500错误</div>
          <span class="msg-tag issue">Issue</span>
        </div>
      </div>

      <div class="msg-card unread">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#10B981,#059669)">王</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-name">王芳</span>
            <span class="msg-time">20 分钟前</span>
          </div>
          <div class="msg-text">评论了研发项 RDI-018：建议增加单元测试覆盖</div>
          <span class="msg-tag rd">研发</span>
        </div>
      </div>

      <div class="msg-card unread">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#F59E0B,#D97706)">系</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-name">系统通知</span>
            <span class="msg-time">1 小时前</span>
          </div>
          <div class="msg-text">新公告已发布：v2.3 版本更新说明</div>
          <span class="msg-tag announce">公告</span>
        </div>
      </div>

      <div class="msg-card">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#3B82F6,#2563EB)">赵</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-name">赵强</span>
            <span class="msg-time">3 小时前</span>
          </div>
          <div class="msg-text">在 Issue NGM-039 中 @了你：这个文件上传的问题需要你协助排查</div>
          <span class="msg-tag issue">Issue</span>
        </div>
      </div>

      <div class="msg-card">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#8B5CF6,#7C3AED)">系</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-name">系统通知</span>
            <span class="msg-time">昨天</span>
          </div>
          <div class="msg-text">服务器维护公告：6月15日凌晨2:00-4:00进行系统升级</div>
          <span class="msg-tag announce">公告</span>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon-wrap"><span class="tab-item-icon">🏠</span></div>
        <span class="tab-item-label">工作台</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">📋</span>
          <span class="tab-badge">16</span>
        </div>
        <span class="tab-item-label">待办</span>
      </div>
      <div class="tab-item active">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">💬</span>
          <span class="tab-badge">3</span>
        </div>
        <span class="tab-item-label">消息</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap"><span class="tab-item-icon">👤</span></div>
        <span class="tab-item-label">我的</span>
      </div>
    </div>
  </div>
</body>
</html>
