<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub V2 Mobile — 我的</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --primary-dark: #4F46E5;
      --bg: #0F1117;
      --surface: #161822;
      --surface-elevated: #1C1F2E;
      --text: #E4E6ED;
      --text-secondary: #8B8FA3;
      --text-muted: #5C5F73;
      --border: #252836;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
      --radius-card: 16px;
      --radius-badge: 8px;
      --tab-height: 56px;
      --header-height: 56px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      border: 3px solid #2A2D3A;
    }
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-bar-right { display: flex; gap: 6px; }
    .header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }

    .scroll-content {
      height: calc(844px - 44px - var(--header-height) - var(--tab-height));
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* User card */
    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .user-role {
      font-size: 13px;
      color: var(--primary-light);
      margin-bottom: 2px;
    }
    .user-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Menu sections */
    .menu-section {
      margin-bottom: 16px;
    }
    .menu-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 4px;
      margin-bottom: 8px;
    }
    .menu-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: var(--surface-elevated); }
    .menu-item-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .menu-item-icon.blue { background: rgba(99,102,241,0.12); color: var(--primary-light); }
    .menu-item-icon.green { background: rgba(16,185,129,0.12); color: var(--success); }
    .menu-item-icon.yellow { background: rgba(245,158,11,0.12); color: var(--warning); }
    .menu-item-icon.gray { background: rgba(139,143,163,0.12); color: var(--text-secondary); }
    .menu-item-icon.red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .menu-item-label {
      flex: 1;
      font-size: 14px;
      color: var(--text);
    }
    .menu-item-arrow {
      color: var(--text-muted);
      font-size: 14px;
    }
    .menu-item-badge {
      padding: 2px 8px;
      background: rgba(99,102,241,0.12);
      border-radius: 6px;
      font-size: 12px;
      color: var(--primary-light);
      font-weight: 500;
    }

    .app-version {
      text-align: center;
      padding: 20px 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Tab bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--tab-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      cursor: pointer;
    }
    .tab-item-icon { font-size: 20px; color: var(--text-muted); line-height: 1; }
    .tab-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .tab-item.active .tab-item-icon { color: var(--primary-light); }
    .tab-item.active .tab-item-label { color: var(--primary-light); }
    .tab-icon-wrap { position: relative; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-right"><span>⦿</span><span>⦿</span><span>⦿</span></div>
    </div>
    <div class="header">
      <div class="header-title">我的</div>
    </div>

    <div class="scroll-content">
      <!-- User Card -->
      <div class="user-card">
        <div class="user-avatar">张</div>
        <div class="user-info">
          <div class="user-name">张明</div>
          <div class="user-role">Admin</div>
          <div class="user-email">zhangming@example.com</div>
        </div>
      </div>

      <!-- Quick stats -->
      <div class="menu-section">
        <div class="menu-section-title">快捷统计</div>
        <div class="menu-group">
          <div class="menu-item">
            <div class="menu-item-icon blue">📋</div>
            <span class="menu-item-label">我的待办</span>
            <span class="menu-item-badge">16</span>
            <span class="menu-item-arrow">›</span>
          </div>
          <div class="menu-item">
            <div class="menu-item-icon green">💬</div>
            <span class="menu-item-label">我的消息</span>
            <span class="menu-item-badge">3</span>
            <span class="menu-item-arrow">›</span>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="menu-section">
        <div class="menu-section-title">设置</div>
        <div class="menu-group">
          <div class="menu-item">
            <div class="menu-item-icon yellow">⚙️</div>
            <span class="menu-item-label">服务器配置</span>
            <span class="menu-item-arrow">›</span>
          </div>
          <div class="menu-item">
            <div class="menu-item-icon blue">🔄</div>
            <span class="menu-item-label">项目切换</span>
            <span class="menu-item-arrow">›</span>
          </div>
          <div class="menu-item">
            <div class="menu-item-icon gray">ℹ️</div>
            <span class="menu-item-label">关于</span>
            <span class="menu-item-arrow">›</span>
          </div>
        </div>
      </div>

      <!-- Logout -->
      <div class="menu-section">
        <div class="menu-group">
          <div class="menu-item">
            <div class="menu-item-icon red">🚪</div>
            <span class="menu-item-label" style="color:var(--danger)">退出登录</span>
          </div>
        </div>
      </div>

      <div class="app-version">Hub V2 Mobile v2.0</div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon-wrap"><span class="tab-item-icon">🏠</span></div>
        <span class="tab-item-label">工作台</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">📋</span>
          <span class="tab-badge">16</span>
        </div>
        <span class="tab-item-label">待办</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon-wrap">
          <span class="tab-item-icon">💬</span>
          <span class="tab-badge">3</span>
        </div>
        <span class="tab-item-label">消息</span>
      </div>
      <div class="tab-item active">
        <div class="tab-icon-wrap"><span class="tab-item-icon">👤</span></div>
        <span class="tab-item-label">我的</span>
      </div>
    </div>
  </div>
</body>
</html>
