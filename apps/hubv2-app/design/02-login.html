<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub V2 Mobile — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --primary-dark: #4F46E5;
      --bg: #0F1117;
      --surface: #161822;
      --surface-elevated: #1C1F2E;
      --text: #E4E6ED;
      --text-secondary: #8B8FA3;
      --text-muted: #5C5F73;
      --border: #252836;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
      --radius-card: 16px;
      --radius-input: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      border: 3px solid #2A2D3A;
    }
    .login-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 80px 32px 48px;
      position: relative;
    }
    .login-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 500px 350px at 50% 20%, rgba(99,102,241,0.1), transparent);
    }
    .login-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .login-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      box-shadow: 0 6px 24px rgba(99,102,241,0.3);
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .login-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      padding: 0 16px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder {
      color: var(--text-muted);
    }
    .form-input:focus {
      border-color: var(--primary);
    }
    .form-input.icon-left {
      padding-left: 44px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .login-btn {
      width: 100%;
      height: 50px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-input);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: var(--primary-dark);
    }
    .login-footer {
      text-align: center;
      margin-top: auto;
      padding-top: 32px;
    }
    .login-footer a {
      font-size: 13px;
      color: var(--primary-light);
      text-decoration: none;
    }
    .server-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="login-screen">
      <div class="login-bg"></div>
      <div class="login-content">
        <div class="login-header">
          <div class="login-logo">H2</div>
          <div class="login-title">Hub V2</div>
          <div class="login-desc">研发协作随身端</div>
        </div>

        <div class="form-group">
          <label class="form-label">服务器地址</label>
          <div class="input-wrapper">
            <span class="input-icon">⛓</span>
            <input class="form-input icon-left" type="url" placeholder="https://hub.example.com" value="https://hub.ng-manager.io">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input class="form-input icon-left" type="text" placeholder="请输入用户名">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="form-input icon-left" type="password" placeholder="请输入密码">
          </div>
        </div>

        <button class="login-btn">登录</button>

        <div class="login-footer">
          <a href="#">忘记密码？</a>
          <div class="server-hint">连接到你的团队私有服务器</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
