<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub V2 Mobile — Cover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --bg: #0F1117;
      --surface: #161822;
      --surface-elevated: #1C1F2E;
      --text: #E4E6ED;
      --text-secondary: #8B8FA3;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
      --radius-card: 16px;
      --radius-hero: 24px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      border: 3px solid #2A2D3A;
    }
    .cover {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      position: relative;
    }
    .cover-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 50% 30%, rgba(99,102,241,0.15), transparent),
        radial-gradient(ellipse 400px 300px at 80% 70%, rgba(99,102,241,0.08), transparent);
    }
    .cover-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), #4F46E5);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.35);
    }
    .cover-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .cover-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-top: -12px;
    }
    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }
    .tag {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .tag.highlight {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      color: var(--primary-light);
    }
    .cover-footer {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1;
    }
    .cover-footer span {
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.5;
    }
    .version-badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 6px;
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="cover">
      <div class="cover-bg"></div>
      <div class="cover-content">
        <div class="logo">H2</div>
        <div class="cover-title">Hub V2 Mobile</div>
        <div class="cover-subtitle">研发协作随身端</div>
        <div class="tag-row">
          <span class="tag highlight">Issue</span>
          <span class="tag highlight">研发项</span>
          <span class="tag highlight">通知</span>
          <span class="tag highlight">协作</span>
        </div>
      </div>
      <div class="cover-footer">
        <div class="version-badge">v2.0 PROTOTYPE</div>
        <br>
        <span>390 × 844 · iOS Frame</span>
      </div>
    </div>
  </div>
</body>
</html>
