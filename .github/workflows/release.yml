name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only run build and pack checks (do not publish)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package validation
        run: npm run pack:all

      - name: Publish packages
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        run: npm run release:publish:pkg
